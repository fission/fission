\* RFC-0027 topic-subscription protocol, guarded (the design): cursor
\* commits are KV version-CAS writes.  All invariants must hold.
CONSTANTS
  Consumers = {c1, c2}
  MaxEvents = 4
  Poison = {2}
  CasGuard = TRUE
SPECIFICATION Spec
INVARIANTS
  TypeOK
  NoLostHandling
  PoisonToErrorTopic
  NoTrimBeyondHandled
  CursorMonotonic
CONSTRAINT StateConstraint

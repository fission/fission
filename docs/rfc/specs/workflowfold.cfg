\* TLC config for workflowfold.tla.
\* Run: java -jar tla2tools.jar -deadlock -config workflowfold.cfg workflowfold.tla
SPECIFICATION Spec
CONSTANTS
  NumSteps = 2
  MaxAttempts = 2
  Reconcilers = {r1, r2}
INVARIANTS
  TypeOK
  NoDupSched
  AtMostOneResult
  ResultHasSched
  TerminalIsLast
  RetryAfterFail
  AttemptsBounded

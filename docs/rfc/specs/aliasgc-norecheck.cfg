\* TLC config for aliasgc.tla WITHOUT the delete-time re-check.
\* This run is EXPECTED TO FAIL: TLC finds the trace where an alias-create for
\* a version commits between GC's scan (saw it unaliased) and GC's delete, so
\* the version is deleted out from under the live alias (violates
\* NoDanglingAlias).  It documents WHY retention GC must re-check alias
\* references inside the delete step (or gate delete on an alias-held
\* finalizer/ownerRef), not act on the sweep's start-of-scan snapshot.
\* Run: java -jar tla2tools.jar -deadlock -config aliasgc-norecheck.cfg aliasgc.tla
SPECIFICATION Spec
CONSTANTS
  Versions = {v1, v2}
  NoOne = NoOne
  RecheckGuard = FALSE
INVARIANTS
  TypeOK
  NoDanglingAlias

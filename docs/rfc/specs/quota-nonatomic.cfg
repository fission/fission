\* TLC config for quota.tla WITHOUT atomic reserve+commit.
\* This run is EXPECTED TO FAIL: TLC finds the check-then-act trace where two
\* writers both observe count < MaxKeys, both pass the budget check, and both
\* commit — count exceeds MaxKeys (violates QuotaNeverExceeded).  It documents
\* WHY statesvc must enforce MaxKeys / the namespace byte budget with an atomic
\* counter operation (a KV CAS or a counted transaction), not a plain
\* read-check-then-write.
\* Run: java -jar tla2tools.jar -deadlock -config quota-nonatomic.cfg quota.tla
SPECIFICATION Spec
CONSTANTS
  Writers = {w1, w2}
  MaxKeys = 1
  AtomicQuota = FALSE
INVARIANTS
  TypeOK
  QuotaNeverExceeded
  CommitsOnce

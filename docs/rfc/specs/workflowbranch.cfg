\* TLC config for workflowbranch.tla (RFC-0022 phase-3 parallel regions).
\* Run: java -jar tla2tools.jar -deadlock -config workflowbranch.cfg workflowbranch.tla
SPECIFICATION Spec
CONSTANTS
  Branches = 2
  MaxAttempts = 2
  Reconcilers = {r1, r2}
INVARIANTS
  TypeOK
  NoDupSched
  AtMostOneResult
  ResultHasSched
  TerminalIsLast
  RetryAfterFail
  AttemptsBounded
  JoinAfterAllBranches
  NothingAfterJoin

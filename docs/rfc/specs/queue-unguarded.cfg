\* TLC config for queue.tla WITHOUT the lease-epoch settle guard.
\* This run is EXPECTED TO FAIL: TLC finds the stale-Kill trace where a
\* stale settle decides the outcome while the current lease's delivery is in flight
\* (violates NoOrphanedCurrentDelivery).  It documents WHY the Postgres
\* driver must guard settles on the epoch column, not the message id.
\* Run: java -jar tla2tools.jar -deadlock -config queue-unguarded.cfg queue.tla
SPECIFICATION Spec
CONSTANTS
  Msgs = {m1}
  Dispatchers = {d1, d2}
  NoOne = NoOne
  MaxAttempts = 2
  LeaseTTL = 1
  MaxTime = 6
  EpochGuard = FALSE
INVARIANTS
  TypeOK
  SettledAtMostOnce
  NoOrphanedCurrentDelivery
  DeadImpliesExhausted
  AttemptsBounded

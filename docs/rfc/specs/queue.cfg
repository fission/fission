\* TLC config for queue.tla — the guarded (correct) design.
\* Run: java -jar tla2tools.jar -deadlock -config queue.cfg queue.tla
SPECIFICATION Spec
CONSTANTS
  Msgs = {m1}
  Dispatchers = {d1, d2}
  NoOne = NoOne
  MaxAttempts = 2
  LeaseTTL = 1
  MaxTime = 6
  EpochGuard = TRUE
INVARIANTS
  TypeOK
  SettledAtMostOnce
  NoOrphanedCurrentDelivery
  DeadImpliesExhausted
  AttemptsBounded
  HolderConsistent

name: Statestore integration

on:
  push:
    branches:
      - main
    paths:
      - 'pkg/statestore/**'
      - '.github/workflows/statestore-integration.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'pkg/statestore/**'
      - '.github/workflows/statestore-integration.yaml'

permissions:
  contents: read

jobs:
  postgres:
    runs-on: ubuntu-24.04
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-ci') }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: "go.mod"

      # The Postgres driver's integration test starts a throwaway Postgres via
      # dockertest (Docker is preinstalled on the runner), then runs the shared
      # conformance suite, KV linearizability (porcupine), and a real-time timing
      # smoke test against it.
      - name: Statestore Postgres integration tests
        run: go test -tags=integration -race -timeout=15m -v ./pkg/statestore/postgres/...

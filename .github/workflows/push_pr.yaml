name: Fission CI

on:
  push:
    branches:
      - main
      - '!dependabot/**'
    paths:
      - "**.go"
      - "charts/**"
      - "test/**"
      - go.mod
      - go.sum
      - .github/workflows/push_pr.yaml
  pull_request:
    branches:
      - main
    paths:
      - "**.go"
      - "charts/**"
      - "test/**"
      - go.mod
      - go.sum
      - .github/workflows/push_pr.yaml

env:
  HELM_VERSION: v4.2.2
  KIND_VERSION: v0.32.0
  KIND_CLUSTER_NAME: kind
  SKAFFOLD_VERSION: v2.22.0
  ENVOY_GATEWAY_VERSION: v1.8.1

permissions:
  contents: read

concurrency:
  group: fission-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job to run change detection
  integration-test:
    runs-on: ${{ matrix.os }}
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-ci') }}
    strategy:
      fail-fast: false
      matrix:
        kindversion: ["v1.32.11", "v1.34.8", "v1.36.1"]
        os: [ubuntu-24.04]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # The image preload pulls + kind-loads ~14 runtime/builder images in
      # parallel, holding each twice on disk at peak (docker store + the kind
      # node's containerd extract); on an unlucky runner that overflows the
      # default free space and the load dies with "no space left" (hit twice
      # on the v1.36 leg). Drop the large preinstalled toolchains we never
      # use — frees ~25GB in a few seconds.
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          df -h /

      - name: setup go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Helm installation
        uses: Azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          node_image: kindest/node:${{ matrix.kindversion }}
          version: ${{ env.KIND_VERSION }}
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          config: kind.yaml

      - name: Configuring and testing the Installation
        run: |
          kubectl cluster-info --context kind-${{ env.KIND_CLUSTER_NAME }}
          kubectl get nodes
          sudo apt-get install -y apache2-utils
          kubectl config use-context kind-${{ env.KIND_CLUSTER_NAME }}
          kubectl config view

      - name: Helm chart lint
        run: |
          helm lint charts/fission-all/

      - name: Install Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/${{ env.SKAFFOLD_VERSION }}/skaffold-linux-amd64
          sudo install skaffold /usr/local/bin/
          skaffold version

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          install-only: true
          version: "~> v2"

      - name: Setup Prometheus Stack
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          kubectl create ns monitoring
          helm install prometheus prometheus-community/kube-prometheus-stack -n monitoring \
          --version 45.28.0 --set grafana.enabled=false --set alertmanager.enabled=false
          helm repo add metrics-server https://kubernetes-sigs.github.io/metrics-server/
          helm install metrics-server metrics-server/metrics-server \
            --namespace kube-system --version 3.13.0 \
            --set 'args={--kubelet-insecure-tls}' \
            --wait --timeout 3m

      - name: Build and Install Fission
        timeout-minutes: 10
        env:
          # Build fission-bundle with Go binary-coverage instrumentation on a
          # single matrix leg only. GOFLAGS=-cover is honoured by `go build`
          # (via goreleaser) but ignored by go subcommands that don't know the
          # flag (e.g. `go mod tidy`). Never set in release.yaml, so published
          # images are never instrumented.
          GOFLAGS: ${{ matrix.kindversion == 'v1.32.11' && '-cover -coverpkg=github.com/fission/fission/...' || '' }}
        run: |
          kubectl create ns fission
          make create-crds
          # The kind-ci profile sets coverage.enabled=true on every leg, so
          # every leg mounts the coverage hostPath (type: Directory, which
          # requires the path to exist). Pre-create it on the node owned by the
          # pod uid (10001), mode 0700 — not world-writable and never created
          # root-owned by kubelet. Only the GOFLAGS leg builds instrumented
          # binaries that write here; uninstrumented binaries ignore GOCOVERDIR
          # and leave it empty.
          docker exec kind-control-plane sh -c \
            'mkdir -p /fission-coverage && chown 10001:10001 /fission-coverage && chmod 0700 /fission-coverage'
          # Multi-namespace tenancy: each leg exercises one of the three postures
          # by composing a skaffold profile onto kind-ci, so every mode stays
          # covered.
          #   v1.32.11 → dynamic  (restart-free FissionTenant onboarding; the
          #              serial TestDynamicTenantLifecycle onboards a fresh ns).
          #   v1.36.1  → cluster  (trusted-cluster watch-all; the controller
          #              auto-onboards every namespace; the serial
          #              TestClusterTenantAutoOnboard runs a function in a fresh,
          #              never-declared namespace and asserts fetcher RBAC stays
          #              per-namespace).
          #   v1.34.8  → static   (the all-legacy leg; RFC-0002/0013/0012 pinned
          #              off below, so the static namespacing path is covered too).
          PROFILE=kind-ci
          case "${{ matrix.kindversion }}" in
            v1.32.11) PROFILE=kind-ci,dynamic-tenancy ;;
            v1.36.1)  PROFILE=kind-ci,cluster-tenancy ;;
          esac
          SKAFFOLD_PROFILE="$PROFILE" make skaffold-deploy

      # The 6-way-parallel integration suite resolves short in-cluster names
      # (executor.fission, storagesvc.fission, router-internal.fission, ...) on
      # every cold-start RPC. Go's resolver fires the A and AAAA queries
      # concurrently; on this single-node kind cluster the two UDP datagrams
      # race through kube-proxy's DNAT and are intermittently dropped, surfacing
      # as "lookup executor.fission: i/o timeout" cascades that fail dozens of
      # otherwise-passing tests at once. single-request-reopen serialises the
      # A/AAAA queries (Go's resolver honours the resolv.conf option), removing
      # the race. CI-only hardening of the control-plane pods.
      - name: Harden in-cluster DNS for the parallel test load
        timeout-minutes: 6
        run: |
          set -euo pipefail
          # kubectl patch takes no --all, so patch each Deployment, then wait
          # for every rollout (patch-all-first so the rollouts run in parallel).
          for d in $(kubectl -n fission get deploy -o name); do
            kubectl -n fission patch "$d" --type merge -p \
              '{"spec":{"template":{"spec":{"dnsConfig":{"options":[{"name":"single-request-reopen"}]}}}}}'
          done
          for d in $(kubectl -n fission get deploy -o name); do
            kubectl -n fission rollout status "$d" --timeout=5m
          done
          # deploy/mcp must exist and be ready (kind-ci enables mcp.enabled):
          # the MCP integration test skips itself when the endpoint is
          # unreachable, so without this explicit gate a profile regression
          # would silently turn all MCP coverage into a green skip — the
          # loop above only waits for deployments that exist.
          kubectl -n fission rollout status deploy/mcp --timeout=3m

      # Pin the v1.34 leg back to the legacy data plane (RFC-0002 gates off):
      # kind-ci deploys with the EndpointSlice path on everywhere, so without
      # this the executor-RPC warm path would lose all CI coverage. The
      # gate-dependent integration tests detect the modes from the live
      # Deployments and skip themselves on this leg.
      - name: Pin legacy data plane (RFC-0002 gates off, RFC-0012 image-volume off)
        if: ${{ matrix.kindversion == 'v1.34.8' }}
        timeout-minutes: 5
        run: |
          kubectl -n fission set env deploy/router ROUTER_ENDPOINTSLICE_CACHE_MODE=off
          kubectl -n fission set env deploy/executor ENABLE_FUNCTION_SERVICES=false ENABLE_OCI_IMAGE_VOLUME-
          kubectl -n fission rollout status deploy/router --timeout=3m
          kubectl -n fission rollout status deploy/executor --timeout=3m

      # Enable the OCI package producer (RFC-0012) on the image-volume leg:
      # builds push to the in-cluster test registry via cluster DNS and the
      # recorded reference uses the node-resolvable NodePort name (the
      # publishedPrefix split-brain knob), so the kubelet's image-volume
      # mounts pull straight from the node. The whole builder test corpus on
      # this leg then rides producer-published OCI packages end-to-end; the
      # other legs keep the tarball pipeline covered.
      - name: Enable OCI package producer (RFC-0012)
        if: ${{ matrix.kindversion == 'v1.36.1' }}
        timeout-minutes: 5
        run: |
          kubectl -n fission set env deploy/buildermgr             PACKAGE_REGISTRY_ENABLED=true             PACKAGE_REGISTRY_REPOSITORY_PREFIX=test-registry.default.svc.cluster.local:5000/fission-builds             PACKAGE_REGISTRY_PUBLISHED_PREFIX=localhost:30500/fission-builds             PACKAGE_REGISTRY_INSECURE_HOSTS=test-registry.default.svc.cluster.local:5000
          kubectl -n fission rollout status deploy/buildermgr --timeout=3m

      # Install Envoy Gateway as the sample Gateway API implementation so the
      # router's gateway route provider (gatewayAPI.enabled=true via kind-ci)
      # has a real Gateway to attach HTTPRoutes to. Only on the coverage leg —
      # one well-supported k8s version is enough to exercise the provider
      # end-to-end; other legs keep the provider enabled but idle (no Gateway,
      # so TestGatewayRoute skips there).
      - name: Install Envoy Gateway (sample Gateway API implementation)
        if: ${{ matrix.kindversion == 'v1.32.11' }}
        timeout-minutes: 6
        run: |
          helm install envoy-gateway oci://docker.io/envoyproxy/gateway-helm \
            --version "${ENVOY_GATEWAY_VERSION}" \
            -n envoy-gateway-system --create-namespace --wait --timeout 5m
          kubectl wait --for=condition=Available -n envoy-gateway-system \
            deploy/envoy-gateway --timeout=3m
          # GatewayClass for Envoy Gateway's controller + a Gateway in the
          # fission namespace. The router creates HTTPRoutes in its own
          # namespace (fission); a same-namespace Gateway + backend Service
          # needs no ReferenceGrant.
          kubectl apply -f - <<'EOF'
          apiVersion: gateway.networking.k8s.io/v1
          kind: GatewayClass
          metadata:
            name: eg
          spec:
            controllerName: gateway.envoyproxy.io/gatewayclass-controller
          ---
          apiVersion: gateway.networking.k8s.io/v1
          kind: Gateway
          metadata:
            name: eg-gateway
            namespace: fission
          spec:
            gatewayClassName: eg
            listeners:
              - name: http
                protocol: HTTP
                port: 80
                allowedRoutes:
                  namespaces:
                    from: Same
          EOF
          # Wait for the Gateway to be accepted/programmed so routes attach.
          kubectl wait --for=condition=Accepted -n fission gateway/eg-gateway --timeout=3m
          kubectl wait --for=condition=Programmed -n fission gateway/eg-gateway --timeout=3m || true
          kubectl get gatewayclass,gateway -A

      # In-cluster registry for the OCI package-delivery tests (RFC-0001):
      # tests push code images via a port-forward; the fetcher (Path A) pulls
      # the ClusterIP Service address (allowlisted for plain HTTP via the
      # kind-ci profile's fetcher.allowInsecureRegistries), and the kubelet
      # (Path B image volumes) pulls localhost:30500 through the NodePort —
      # containerd trusts localhost registries over plain HTTP by default, so
      # no containerd config is needed. Enabled on the 1.32 leg (the floor
      # version Path A must support) and the 1.36 leg (which also runs the
      # image-volume tests); the middle leg skips the
      # FISSION_TEST_REGISTRY-gated tests.
      - name: Deploy test registry (OCI package delivery)
        if: ${{ matrix.kindversion == 'v1.32.11' || matrix.kindversion == 'v1.36.1' }}
        timeout-minutes: 4
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: test-registry
            namespace: default
            labels: {app: test-registry}
          spec:
            replicas: 1
            selector:
              matchLabels: {app: test-registry}
            template:
              metadata:
                labels: {app: test-registry}
              spec:
                containers:
                  - name: registry
                    image: registry:2
                    ports:
                      - containerPort: 5000
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: test-registry
            namespace: default
          spec:
            type: NodePort
            selector: {app: test-registry}
            ports:
              - port: 5000
                targetPort: 5000
                nodePort: 30500
          EOF
          kubectl rollout status deploy/test-registry -n default --timeout=3m

      # CI-ONLY OpenTelemetry Collector + Loki for the RFC-0016 OTLP logging
      # read-path test (TestFunctionLogsLokiCorrelation). Fission bundles no log
      # backend — collection is operator-run (see
      # docs/rfc/0016-otlp-native-logging-pipeline.md) — so this stands up the
      # operator's side in CI: the collector tails the router's per-invocation
      # access record (router.displayAccessLog on via kind-ci) and pushes it to
      # Loki's OTLP endpoint, where the `loki` logdb driver queries it by
      # request id. One leg covers the pipeline; other legs leave
      # FISSION_TEST_LOKI unset so the test skips (like the Gateway/registry
      # gates). Manifests live in test/integration/otel/, not the chart.
      - name: Deploy OTel Collector + Loki (RFC-0016 logging)
        if: ${{ matrix.kindversion == 'v1.34.8' }}
        timeout-minutes: 5
        run: |
          kubectl apply -f test/integration/otel/loki.yaml
          kubectl apply -f test/integration/otel/otel-collector.yaml
          kubectl rollout status deploy/loki -n fission-logging --timeout=3m
          kubectl rollout status daemonset/otel-collector -n fission-logging --timeout=3m

      # The conditional forward loops (test-registry, loki) are started inside
      # the Go test step rather than as a standalone step, because background
      # processes started with `&` may not survive across GitHub Actions steps
      # on every runner image. Router/mcp traffic needs no forwards — the test
      # framework port-forwards in-process and its dials wait for readiness.

      - name: Go integration tests (common + serial phases)
        # Margin over the hard go-test timeouts this step contains (common 35m +
        # serial 25m) plus image preload / jar build setup, so a slow-but-valid
        # run isn't killed by the step timeout before a go-test timeout can fire.
        # common bumped to 35m for the rust/jvm/jersey builder tests (cargo crate
        # fetch + Maven dependency download on first build); serial bumped to 25m
        # for TestDynamicTenantLifecycle on the dynamic legs (onboard → cold-start
        # function → offboard, on top of the adopt/executor-down tests).
        timeout-minutes: 70
        env:
          NODE_RUNTIME_IMAGE: ghcr.io/fission/node-env-22
          NODE_BUILDER_IMAGE: ghcr.io/fission/node-builder-22
          PYTHON_RUNTIME_IMAGE: ghcr.io/fission/python-env
          PYTHON_BUILDER_IMAGE: ghcr.io/fission/python-builder
          GO_RUNTIME_IMAGE: ghcr.io/fission/go-env-1.26
          GO_BUILDER_IMAGE: ghcr.io/fission/go-builder-1.26
          # Rust env builds through its builder even for single-file functions
          # (TestRustEnv); no code-only path.
          RUST_RUNTIME_IMAGE: ghcr.io/fission/rust-env
          RUST_BUILDER_IMAGE: ghcr.io/fission/rust-builder
          # JVM (Spring Boot) via the builder path (TestJavaBuilder); the
          # jar-deploy test (TestJavaEnv) stays skipped without JAVA_HELLO_JAR_PATH.
          JVM_RUNTIME_IMAGE: ghcr.io/fission/jvm-env
          JVM_BUILDER_IMAGE: ghcr.io/fission/jvm-builder
          # JVM Jersey via the builder path (TestJVMJerseyBuilder); the
          # jar-deploy test (TestJVMJerseyEnv) stays skipped without JVM_JERSEY_JAR_PATH.
          JVM_JERSEY_RUNTIME_IMAGE: ghcr.io/fission/jvm-jersey-env-25
          JVM_JERSEY_BUILDER_IMAGE: ghcr.io/fission/jvm-jersey-builder-25
          # TensorFlow Serving runtime (TestTensorflowServingEnv): deploys the
          # vendored half_plus_two SavedModel (deploy archive, no builder). The
          # image is large (~1GB) so it dominates the preload, but the test is
          # otherwise self-contained.
          TS_RUNTIME_IMAGE: ghcr.io/fission/tensorflow-serving-env
          # Container-executor backend test (TestBackendContainer): a plain
          # HTTP server image that returns 200 on GET / and honours a PORT env
          # var. hello-app defaults to 8080 but reads PORT; the test injects
          # PORT=8888 (via configmap) so the function listens on 8888 — the
          # port the function-pods NetworkPolicy lets the router reach.
          CONTAINER_RUNTIME_IMAGE: gcr.io/google-samples/hello-app:1.0
          # Gates TestGatewayRoute: set only on the leg where Envoy Gateway +
          # the eg-gateway Gateway are installed (above). Empty elsewhere, so
          # the test skips. Value is the parentRef the test attaches to.
          TEST_GATEWAY_PARENTREF: ${{ matrix.kindversion == 'v1.32.11' && 'fission/eg-gateway' || '' }}
          FISSION_NAMESPACE: fission
          LOG_DIR: ${{ github.workspace }}/test/integration/logs
        run: |
          # Pre-pull and kind-load every runtime/builder image referenced by
          # tests in this phase so the Kind nodes don't re-pull on first
          # function invocation. Add new images to this list as more tests
          # land. Set FOO_IMAGE="" in the env block above to skip an image.
          # Pull/load run in parallel — sequential was ~50s, parallel ~15s.
          load_image() {
            local img="$1"
            [ -z "$img" ] && return 0
            docker pull -q "$img" \
              && kind load docker-image "$img" --name "${KIND_CLUSTER_NAME}"
          }
          export -f load_image
          export KIND_CLUSTER_NAME
          pids=()
          for img in "$NODE_RUNTIME_IMAGE" "$NODE_BUILDER_IMAGE" "$PYTHON_RUNTIME_IMAGE" "$PYTHON_BUILDER_IMAGE" "$GO_RUNTIME_IMAGE" "$GO_BUILDER_IMAGE" "$RUST_RUNTIME_IMAGE" "$RUST_BUILDER_IMAGE" "$JVM_RUNTIME_IMAGE" "$JVM_BUILDER_IMAGE" "$JVM_JERSEY_RUNTIME_IMAGE" "$JVM_JERSEY_BUILDER_IMAGE" "$TS_RUNTIME_IMAGE" "$CONTAINER_RUNTIME_IMAGE"; do
            load_image "$img" &
            pids+=($!)
          done
          for pid in "${pids[@]}"; do
            wait "$pid" || { echo "image preload failed (pid $pid)"; exit 1; }
          done

          # Build the Java fat jars for the jar-deploy subtests (TestJavaEnv/deploy_jar,
          # TestJVMJerseyEnv/deploy_jar). The example poms depend on fission-java-core /
          # fission-jvm-jersey, which are not on Maven Central — they live in the builder
          # images' local .m2. So run `mvn package` *inside* the (already-pulled) builder
          # image, which resolves them exactly as an in-cluster build does. Output goes to
          # a dir outside the repo tree so it doesn't pollute the testdata embed or leave
          # root-owned files in the checkout. Export the jar paths for the go test below.
          build_jar() {
            local img="$1" src="$2" out="$3"
            # Empty image (var blanked to skip) → leave the jar absent; the
            # jar-deploy subtest then skips itself on the missing path.
            [ -z "$img" ] && { echo "skip jar build for $src (image unset)"; return 0; }
            docker run --rm --entrypoint /bin/bash \
              -v "$PWD/$src":/src:ro -v "$(dirname "$out")":/out \
              "$img" -c "mkdir -p /build && cp -a /src/. /build/ && cd /build \
                && mvn -q -B clean package && cp target/*with-dependencies.jar /out/$(basename "$out")"
          }
          JAR_DIR="${RUNNER_TEMP:-/tmp}/java-jars"
          mkdir -p "$JAR_DIR"
          build_jar "$JVM_BUILDER_IMAGE" test/integration/testdata/java/hello_world "$JAR_DIR/hello-world.jar"
          build_jar "$JVM_JERSEY_BUILDER_IMAGE" test/integration/testdata/jvm_jersey/hello_world "$JAR_DIR/jersey-hello-world.jar"
          export JAVA_HELLO_JAR_PATH="$JAR_DIR/hello-world.jar"
          export JVM_JERSEY_JAR_PATH="$JAR_DIR/jersey-hello-world.jar"
          echo "built jars: $(ls -l "$JAR_DIR")"

          # No router/mcp port-forwards: the integration framework
          # port-forwards in-process (go-portless registry — router.fission /
          # router-internal.fission / mcp.fission resolved from
          # FISSION_NAMESPACE), self-healing across pod restarts and blocking
          # dials until the service is ready. Only services dialed by plain
          # HTTP clients outside the framework still need a forward loop:
          # OCI test registry (RFC-0001), deployed on the 1.32 + 1.36 legs.
          # Tests push through the forward; the fetcher pulls the Service
          # address. Env vars unset on other legs => tests skip. The 1.36 leg
          # additionally runs the image-volume (Path B) tests: the kubelet
          # pulls localhost:30500 via the registry's NodePort (containerd's
          # built-in localhost HTTP exception — no node config needed).
          PF_PID_REG=""
          if [ "${{ matrix.kindversion }}" = "v1.32.11" ] || [ "${{ matrix.kindversion }}" = "v1.36.1" ]; then
            ( while true; do kubectl port-forward svc/test-registry 5001:5000 -n default || true; sleep 1; done ) >/tmp/pf-registry.log 2>&1 &
            PF_PID_REG=$!
            export FISSION_TEST_REGISTRY=127.0.0.1:5001
            export FISSION_TEST_REGISTRY_INCLUSTER=test-registry.default.svc.cluster.local:5000
          fi
          if [ "${{ matrix.kindversion }}" = "v1.36.1" ]; then
            export FISSION_TEST_IMAGE_VOLUME=1
            export FISSION_TEST_REGISTRY_NODE=localhost:30500
            export FISSION_TEST_OCI_PRODUCER=1
          fi
          # OTel Collector + Loki (RFC-0016), deployed on the 1.34 leg. Forward
          # Loki so the in-process `loki` logdb driver reaches it via LOKI_URL;
          # FISSION_TEST_LOKI gates TestFunctionLogsLokiCorrelation (unset
          # elsewhere => the test skips).
          PF_PID_LOKI=""
          if [ "${{ matrix.kindversion }}" = "v1.34.8" ]; then
            ( while true; do kubectl port-forward svc/loki 3100:3100 -n fission-logging || true; sleep 1; done ) >/tmp/pf-loki.log 2>&1 &
            PF_PID_LOKI=$!
            export LOKI_URL=http://127.0.0.1:3100
            export FISSION_TEST_LOKI=1
          fi
          trap "kill $PF_PID_REG $PF_PID_LOKI 2>/dev/null || true" EXIT

          # Export the master HMAC secret so the framework's RouterClient
          # signs /fission-function/... requests against the internal
          # listener. Empty when internalAuth is disabled — the framework
          # falls back to unsigned and the verifier short-circuits.
          if kubectl get secret fission-internal-auth -n "$FISSION_NAMESPACE" >/dev/null 2>&1; then
            export FISSION_INTERNAL_AUTH_SECRET=$(kubectl get secret fission-internal-auth \
              -n "$FISSION_NAMESPACE" -o jsonpath='{.data.secret}' | base64 -d)
            echo "exported FISSION_INTERNAL_AUTH_SECRET (${#FISSION_INTERNAL_AUTH_SECRET} bytes)"
          else
            echo "fission-internal-auth Secret not present — running tests in unsigned mode"
          fi

          # No readiness poll: the framework's registry blocks each dial until
          # the target service accepts, so the first test request self-waits.

          # On the coverage leg, also instrument the test binary itself so the
          # CLI + client-library code the suite drives in-process (via
          # cmd/fission-cli/app.App) is captured. The test process writes
          # binary-coverage data to covdata-cli/, merged with the pod data in
          # the collect step. Other legs run uninstrumented.
          COVER_FLAGS=()
          COVER_ARGS=()
          if [ "${{ matrix.kindversion }}" = "v1.32.11" ]; then
            mkdir -p "$PWD/covdata-cli"
            COVER_FLAGS=(-cover -coverpkg=github.com/fission/fission/...)
            COVER_ARGS=(-args -test.gocoverdir="$PWD/covdata-cli")
          fi
          go test -tags=integration "${COVER_FLAGS[@]}" -timeout=35m -parallel 6 -v \
            ./test/integration/suites/common/... "${COVER_ARGS[@]}"

          # Serial phase: tests that mutate cluster-wide control-plane state
          # (e.g. restarting the executor to exercise AdoptExistingResources)
          # and so cannot run alongside the parallel common suite. Runs after
          # it, single-package (-p 1), reusing the HMAC secret established
          # above. On the coverage leg the same -cover flags
          # apply, so the in-process CLI coverage merges into covdata-cli and
          # the executor pod's adopt-path coverage flushes to the node hostPath.
          # -timeout is kept above the test's own 15m context deadline so the
          # context fires first (clear failure) rather than the hard timeout.
          go test -tags=integration "${COVER_FLAGS[@]}" -p 1 -timeout=25m -v \
            ./test/integration/suites/serial/... "${COVER_ARGS[@]}"

      - name: Collect integration coverage
        # Only the instrumented leg produced coverage; collect there.
        if: ${{ matrix.kindversion == 'v1.32.11' }}
        timeout-minutes: 5
        run: |
          # Graceful delete (foreground cascade) sends SIGTERM and waits for
          # pods to terminate. fission-bundle returns from main on the first
          # signal, which triggers the Go runtime's coverage exit hook and
          # flushes counters to the node hostPath. Do not force-kill.
          kubectl delete deploy --all -n fission --cascade=foreground --timeout=120s || true
          mkdir -p covdata-raw
          docker cp kind-control-plane:/fission-coverage/. covdata-raw/ || true
          echo "server (pod) coverage files:"; ls -la covdata-raw || true
          echo "cli (test-process) coverage files:"; ls -la covdata-cli 2>/dev/null || true
          # Merge whatever we have: covdata-raw = fission-bundle pods,
          # covdata-cli = the in-process CLI/library code. go tool covdata
          # handles meta files from different binaries.
          INPUTS=""
          ls covdata-raw/covmeta.* >/dev/null 2>&1 && INPUTS="covdata-raw"
          if ls covdata-cli/covmeta.* >/dev/null 2>&1; then
            INPUTS="${INPUTS:+$INPUTS,}covdata-cli"
          fi
          if [ -n "$INPUTS" ]; then
            go tool covdata percent -i="$INPUTS" || true
            go tool covdata textfmt -i="$INPUTS" -o=integration-coverage.txt
            echo "wrote integration-coverage.txt from [$INPUTS] ($(wc -l < integration-coverage.txt) lines)"
          else
            echo "no coverage meta files collected — skipping merge"
          fi

      - name: Upload integration coverage to CodeCov
        if: ${{ matrix.kindversion == 'v1.32.11' && hashFiles('integration-coverage.txt') != '' }}
        continue-on-error: true
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: integration
          file: ./integration-coverage.txt
          fail_ci_if_error: false

      - name: Collect Fission Dump
        timeout-minutes: 5
        if: ${{ always() }}
        run: |
          # The Go integration suite drives the CLI in-process via
          # cmd.fission-cli/app.App, so /usr/local/bin/fission is not
          # installed in this job. Tolerate its absence on dump.
          command -v fission && fission support dump || true

      - name: Kind export logs
        timeout-minutes: 10
        if: ${{ always() }}
        run: |
          kind export logs --name ${{ env.KIND_CLUSTER_NAME }} kind-logs

      - name: Collect pprof profiles
        timeout-minutes: 5
        if: ${{ always() }}
        run: |
          # Capture heap + goroutine profiles from the long-lived control-plane
          # components for memory-leak triage. pprof is exposed on :6060 by the
          # kind-ci profile (pprof.enabled=true). Best-effort: never fail the job.
          mkdir -p pprof-dumps
          for svc in router executor workflow; do
            pod=$(kubectl get pods -n fission -l svc=$svc -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            [ -z "$pod" ] && { echo "no $svc pod found, skipping"; continue; }
            kubectl port-forward -n fission "pod/$pod" 6060:6060 >/dev/null 2>&1 &
            pf_pid=$!
            for i in $(seq 1 10); do curl -fsS http://127.0.0.1:6060/debug/pprof/ >/dev/null 2>&1 && break; sleep 1; done
            curl -fsS "http://127.0.0.1:6060/debug/pprof/heap" -o "pprof-dumps/${svc}-heap.pprof" || echo "heap capture failed for $svc"
            curl -fsS "http://127.0.0.1:6060/debug/pprof/goroutine?debug=1" -o "pprof-dumps/${svc}-goroutine.txt" || echo "goroutine capture failed for $svc"
            kill "$pf_pid" 2>/dev/null || true
          done
          ls -l pprof-dumps || true

      - name: Backup prometheus data
        timeout-minutes: 10
        if: ${{ always() }}
        run: |
          TRACE=1 ./hack/backup-prometheus.sh

      - name: Dump port-forward logs
        timeout-minutes: 2
        if: ${{ failure() || cancelled() }}
        run: |
          # The self-healing forward loops (test-registry, loki) convert a
          # permanently-dead service into test-timeout-shaped failures; the
          # repeating "unable to forward" lines naming the real cause live
          # only in these runner-local files, which no artifact captures.
          # (Router/mcp traffic goes through the in-process registry, whose
          # dial errors surface directly in test output.)
          for f in /tmp/pf-registry.log /tmp/pf-loki.log; do
            echo "===== $f ====="
            tail -n 100 "$f" 2>/dev/null || echo "(absent)"
          done

      - name: Archive fission dump
        timeout-minutes: 10
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fission-dump-${{ github.run_id }}-${{ matrix.kindversion }}
          path: fission-dump/*.zip
          retention-days: 5

      - name: Archive prometheus dump
        timeout-minutes: 10
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prom-dump-${{ github.run_id }}-${{ matrix.kindversion }}
          path: /tmp/prometheus/*
          retention-days: 5

      - name: Archive pprof profiles
        timeout-minutes: 10
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pprof-dumps-${{ github.run_id }}-${{ matrix.kindversion }}
          path: pprof-dumps/*
          retention-days: 5
          if-no-files-found: ignore

      - name: Archive kind logs
        timeout-minutes: 10
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kind-logs-${{ github.run_id }}-${{ matrix.kindversion }}
          path: kind-logs/*
          retention-days: 5

      - name: Archive Go integration test logs
        timeout-minutes: 10
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-integration-logs-${{ github.run_id }}-${{ matrix.kindversion }}
          path: test/integration/logs/
          retention-days: 5
          if-no-files-found: ignore


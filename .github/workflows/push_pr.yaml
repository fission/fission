name: Fission CI

on:
  push:
    branches:
      - main
      - '!dependabot/**'
    paths:
      - "**.go"
      - "charts/**"
      - "test/**"
      - go.mod
      - go.sum
  pull_request:
    branches:
      - main
    paths:
      - "**.go"
      - "charts/**"
      - "test/**"
      - go.mod
      - go.sum

env:
  HELM_VERSION: v4.0.1
  KIND_VERSION: v0.30.0
  KIND_CLUSTER_NAME: kind
  SKAFFOLD_VERSION: v2.17.0

permissions:
  contents: read

concurrency:
  group: fission-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job to run change detection
  integration-test:
    runs-on: ${{ matrix.os }}
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-ci') }}
    strategy:
      fail-fast: false
      matrix:
        kindversion: ["v1.28.15", "v1.32.8", "v1.34.0"]
        os: [ubuntu-24.04]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Helm installation
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          node_image: kindest/node:${{ matrix.kindversion }}
          version: ${{ env.KIND_VERSION }}
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          config: kind.yaml

      - name: Configuring and testing the Installation
        run: |
          kubectl cluster-info --context kind-${{ env.KIND_CLUSTER_NAME }}
          kubectl get nodes
          sudo apt-get install -y apache2-utils
          kubectl config use-context kind-${{ env.KIND_CLUSTER_NAME }}
          kubectl config view

      - name: Helm chart lint
        run: |
          helm lint charts/fission-all/

      - name: Install Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/${{ env.SKAFFOLD_VERSION }}/skaffold-linux-amd64
          sudo install skaffold /usr/local/bin/
          skaffold version

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          install-only: true
          version: "~> v2"

      - name: Setup Prometheus Stack
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          kubectl create ns monitoring
          helm install prometheus prometheus-community/kube-prometheus-stack -n monitoring \
          --version 45.28.0 --set grafana.enabled=false --set alertmanager.enabled=false

      - name: Build and Install Fission
        timeout-minutes: 10
        run: |
          kubectl create ns fission
          make create-crds
          SKAFFOLD_PROFILE=kind-ci make skaffold-deploy

      # Port-forward is started inside the Go test step rather than as a
      # standalone step, because background processes started with `&` may
      # not survive across GitHub Actions steps on every runner image.
      # Wait-for-readiness covers cluster startup races.

      - name: Go integration tests (common phase)
        timeout-minutes: 30
        env:
          NODE_RUNTIME_IMAGE: ghcr.io/fission/node-env-22
          NODE_BUILDER_IMAGE: ghcr.io/fission/node-builder-22
          PYTHON_RUNTIME_IMAGE: ghcr.io/fission/python-env
          PYTHON_BUILDER_IMAGE: ghcr.io/fission/python-builder
          GO_RUNTIME_IMAGE: ghcr.io/fission/go-env-1.23
          GO_BUILDER_IMAGE: ghcr.io/fission/go-builder-1.23
          FISSION_ROUTER: 127.0.0.1:8888
          FISSION_NAMESPACE: fission
          LOG_DIR: ${{ github.workspace }}/test/integration/logs
        run: |
          # Pre-pull and kind-load every runtime/builder image referenced by
          # tests in this phase so the Kind nodes don't re-pull on first
          # function invocation. Add new images to this list as more tests
          # land. Set FOO_IMAGE="" in the env block above to skip an image.
          # Pull/load run in parallel — sequential was ~50s, parallel ~15s.
          load_image() {
            local img="$1"
            [ -z "$img" ] && return 0
            docker pull -q "$img" \
              && kind load docker-image "$img" --name "${KIND_CLUSTER_NAME}"
          }
          export -f load_image
          export KIND_CLUSTER_NAME
          pids=()
          for img in "$NODE_RUNTIME_IMAGE" "$NODE_BUILDER_IMAGE" "$PYTHON_RUNTIME_IMAGE" "$PYTHON_BUILDER_IMAGE" "$GO_RUNTIME_IMAGE" "$GO_BUILDER_IMAGE"; do
            load_image "$img" &
            pids+=($!)
          done
          for pid in "${pids[@]}"; do
            wait "$pid" || { echo "image preload failed (pid $pid)"; exit 1; }
          done

          kubectl port-forward svc/router 8888:80 -n "$FISSION_NAMESPACE" >/tmp/pf.log 2>&1 &
          PF_PID=$!
          trap "kill $PF_PID 2>/dev/null || true" EXIT

          # Wait for port-forward to accept TCP connections. Without -f, curl
          # exits 0 for any HTTP response (including 4xx/5xx) and exit 7 for
          # connection refused — exactly what we want here.
          for i in $(seq 1 30); do
            if curl -sS --connect-timeout 1 --max-time 2 -o /dev/null "http://127.0.0.1:8888/" 2>/dev/null; then
              echo "router port-forward ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "router port-forward did not become ready in 30s; pf log:"
              cat /tmp/pf.log || true
              exit 1
            fi
            sleep 1
          done

          go test -tags=integration -timeout=25m -parallel 6 -v \
            ./test/integration/suites/common/...

      - name: Collect Fission Dump
        timeout-minutes: 5
        if: ${{ always() }}
        run: |
          # The Go integration suite drives the CLI in-process via
          # cmd.fission-cli/app.App, so /usr/local/bin/fission is not
          # installed in this job. Tolerate its absence on dump.
          command -v fission && fission support dump || true

      - name: Kind export logs
        timeout-minutes: 10
        if: ${{ always() }}
        run: |
          kind export logs --name ${{ env.KIND_CLUSTER_NAME }} kind-logs

      - name: Backup prometheus data
        timeout-minutes: 10
        if: ${{ always() }}
        run: |
          TRACE=1 ./hack/backup-prometheus.sh

      - name: Archive fission dump
        timeout-minutes: 10
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fission-dump-${{ github.run_id }}-${{ matrix.kindversion }}
          path: fission-dump/*.zip
          retention-days: 5

      - name: Archive prometheus dump
        timeout-minutes: 10
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prom-dump-${{ github.run_id }}-${{ matrix.kindversion }}
          path: /tmp/prometheus/*
          retention-days: 5

      - name: Archive kind logs
        timeout-minutes: 10
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kind-logs-${{ github.run_id }}-${{ matrix.kindversion }}
          path: kind-logs/*
          retention-days: 5

      - name: Archive Go integration test logs
        timeout-minutes: 10
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-integration-logs-${{ github.run_id }}-${{ matrix.kindversion }}
          path: test/integration/logs/
          retention-days: 5
          if-no-files-found: ignore


name: TLC model check

on:
  push:
    branches:
      - main
    paths:
      - 'docs/rfc/specs/**'
      - 'pkg/statestore/**'
      - 'pkg/workflow/**'
      - 'hack/run-tlc.sh'
      - '.github/workflows/tlc.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/rfc/specs/**'
      - 'pkg/statestore/**'
      - 'pkg/workflow/**'
      - 'hack/run-tlc.sh'
      - '.github/workflows/tlc.yaml'

permissions:
  contents: read

env:
  TLA2TOOLS_VERSION: "1.8.0"

jobs:
  tlc:
    runs-on: ubuntu-24.04
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-ci') }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Model-check the RFC protocol specs (queue + workflow fold)
        run: ./hack/run-tlc.sh

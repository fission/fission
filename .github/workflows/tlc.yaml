name: TLC model check

on:
  push:
    branches:
      - main
    paths:
      - 'docs/rfc/specs/**'
      - 'pkg/statestore/**'
      - 'pkg/workflow/**'
      - 'hack/run-tlc.sh'
      - '.github/workflows/tlc.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/rfc/specs/**'
      - 'pkg/statestore/**'
      - 'pkg/workflow/**'
      - 'hack/run-tlc.sh'
      - '.github/workflows/tlc.yaml'

permissions:
  contents: read

env:
  TLA2TOOLS_VERSION: "1.8.0"

jobs:
  tlc:
    runs-on: ubuntu-24.04
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-ci') }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Model-check the RFC protocol specs (queue + workflow fold)
        run: ./hack/run-tlc.sh

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: functionaliases.fission.io
spec:
  group: fission.io
  names:
    kind: FunctionAlias
    listKind: FunctionAliasList
    plural: functionaliases
    shortNames:
    - fnalias
    singular: functionalias
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.functionName
      name: Function
      type: string
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .spec.weight
      name: Weight
      type: integer
    - jsonPath: .status.resolvedVersion
      name: ResolvedVersion
      type: string
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          FunctionAlias is a mutable, named pointer at one (or, during a weighted
          rollout, two) FunctionVersion(s) of a Function (RFC-0025). Aliases are
          what triggers reference in production; moving an alias is how a rollout
          or rollback happens without touching the trigger.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: 'Repo convention (types.go:755,778,955): guard BOTH absent
              and explicit-empty on optional strings.'
            properties:
              functionName:
                maxLength: 63
                type: string
              packageDigest:
                description: |-
                  PackageDigest pins declaratively (GitOps): resolved asynchronously to
                  the FunctionVersion that recorded this digest; eventually consistent.
                pattern: ^sha256:[a-f0-9]{64}$
                type: string
              secondaryVersion:
                description: SecondaryVersion receives 100-Weight. Name-pinned only.
                type: string
              version:
                description: Version pins by FunctionVersion name (imperative path).
                  XOR PackageDigest.
                type: string
              weight:
                description: Weight (0-100) served by the primary target; nil = 100%.
                maximum: 100
                minimum: 0
                type: integer
            required:
            - functionName
            type: object
            x-kubernetes-validations:
            - message: exactly one of version and packageDigest must be set
              rule: (has(self.version) && self.version != '') != (has(self.packageDigest)
                && self.packageDigest != '')
            - message: weight requires secondaryVersion
              rule: '!has(self.weight) || (has(self.secondaryVersion) && self.secondaryVersion
                != '''')'
            - message: secondaryVersion must differ from version
              rule: '!has(self.secondaryVersion) || self.secondaryVersion == ''''
                || !has(self.version) || self.secondaryVersion != self.version'
          status:
            description: FunctionAliasStatus describes the observed state of a FunctionAlias.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              history:
                description: |-
                  History is a bounded tail of previously resolved targets, most
                  recent last.
                items:
                  description: |-
                    AliasTargetRecord is one entry in FunctionAliasStatus.History: a
                    previously resolved target, kept for audit / rollback visibility.
                  properties:
                    packageDigest:
                      type: string
                    switchedAt:
                      format: date-time
                      type: string
                    version:
                      type: string
                  required:
                  - switchedAt
                  - version
                  type: object
                type: array
              resolvedVersion:
                description: |-
                  ResolvedVersion is the FunctionVersion name this alias currently
                  resolves to (always name-pinned, even when Spec.PackageDigest
                  declares the target declaratively).
                type: string
            type: object
        required:
        - metadata
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

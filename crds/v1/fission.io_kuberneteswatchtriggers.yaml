---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: kuberneteswatchtriggers.fission.io
spec:
  group: fission.io
  names:
    kind: KubernetesWatchTrigger
    listKind: KubernetesWatchTriggerList
    plural: kuberneteswatchtriggers
    singular: kuberneteswatchtrigger
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: KubernetesWatchTrigger watches kubernetes resource events and
          invokes functions.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: KubernetesWatchTriggerSpec defines spec of KuberenetesWatchTrigger
            properties:
              functionref:
                description: |-
                  The reference to a function for kubewatcher to invoke with
                  when receiving events.
                properties:
                  alias:
                    description: |-
                      Alias, when set, targets a FunctionAlias by name instead of the live
                      Function directly (RFC-0025): the alias is a movable pointer that the
                      router resolves at request time to whatever FunctionVersion it
                      currently points at, so repointing the alias (e.g. for a canary
                      rollout or a rollback) redirects traffic without touching this
                      reference. Valid only when Type is "name"; mutually exclusive with
                      Version. Empty (the default) preserves today's behavior: route
                      straight to the live Function. Router-side resolution lands in a
                      later RFC-0025 task — until then this field is accepted but inert.
                    maxLength: 63
                    type: string
                  functionweights:
                    additionalProperties:
                      type: integer
                    description: |-
                      Function Reference by weight. this map contains function name as key and its weight
                      as the value. This is for canary upgrade purpose.
                    nullable: true
                    type: object
                  name:
                    description: |-
                      Name of the function. Bounded to a DNS-1123 label length: the CEL
                      rule on this type needs the schema bound so the apiserver's cost
                      estimator can price the regex — without it, embedding the type
                      under a map (WorkflowSpec.States) blows the per-CRD cost budget.
                    maxLength: 63
                    type: string
                  type:
                    description: |-
                      Type indicates whether this function reference is by name or selector. For now,
                      the only supported reference type is by "name".  Future reference types:
                        * Function by label or annotation
                        * Branch or tag of a versioned function
                        * A "rolling upgrade" from one version of a function to another
                      Available value:
                      - name
                      - function-weights
                    enum:
                    - name
                    - function-weights
                    type: string
                  version:
                    description: |-
                      Version, when set, pins this reference to one FunctionVersion CR by
                      name (RFC-0025) — an immutable published snapshot that never moves,
                      unlike Alias. Valid only when Type is "name"; mutually exclusive
                      with Alias. Empty (the default) preserves today's behavior: route
                      straight to the live Function. Router-side resolution lands in a
                      later RFC-0025 task — until then this field is accepted but inert.
                    maxLength: 63
                    type: string
                required:
                - name
                - type
                type: object
                x-kubernetes-validations:
                - message: functionref.name must be a valid DNS1123 label (lowercase
                    alphanumeric or '-', start/end alphanumeric, max 63 chars) when
                    type is 'name'
                  rule: self.type != 'name' || (self.name.size() <= 63 && self.name.matches('^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'))
                - message: functionref.alias and functionref.version are mutually
                    exclusive
                  rule: '!((has(self.alias) && self.alias != '''') && (has(self.version)
                    && self.version != ''''))'
                - message: functionref.alias is only valid when type is 'name'
                  rule: '!(has(self.alias) && self.alias != '''') || self.type ==
                    ''name'''
                - message: functionref.version is only valid when type is 'name'
                  rule: '!(has(self.version) && self.version != '''') || self.type
                    == ''name'''
              labelselector:
                additionalProperties:
                  type: string
                description: Resource labels
                type: object
              namespace:
                maxLength: 63
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                type: string
              type:
                description: Type of resource to watch (Pod, Service, etc.)
                type: string
                x-kubernetes-validations:
                - message: spec.type must be one of POD, SERVICE, REPLICATIONCONTROLLER,
                    JOB (case-insensitive)
                  rule: self.upperAscii() in ['POD','SERVICE','REPLICATIONCONTROLLER','JOB']
            required:
            - functionref
            - namespace
            - type
            type: object
          status:
            description: KubernetesWatchTriggerStatus describes the observed state
              of a KubernetesWatchTrigger.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                format: int64
                type: integer
            type: object
        required:
        - metadata
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

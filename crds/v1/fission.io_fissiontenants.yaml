---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: fissiontenants.fission.io
spec:
  group: fission.io
  names:
    kind: FissionTenant
    listKind: FissionTenantList
    plural: fissiontenants
    shortNames:
    - ftenant
    singular: fissiontenant
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.namespace
      name: Namespace
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          FissionTenant onboards a Kubernetes namespace for Fission. It is the
          cluster-scoped source of truth the tenant-lifecycle controller reconciles
          into the live resource-namespace set (and, in later phases, per-namespace
          RBAC, service accounts, and auth keys). Setting the label
          fission.io/enabled=true on a Namespace is sugar the controller
          materializes into one of these. See docs/multiple-namespace/prd.md.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              FissionTenantSpec declares which namespace Fission manages and, optionally,
              where that tenant's function and builder workloads run.
            properties:
              builderNamespace:
                description: |-
                  BuilderNamespace, if set, is where this tenant's builder pods run;
                  empty means they run in spec.namespace.
                maxLength: 63
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                type: string
              functionNamespace:
                description: |-
                  FunctionNamespace, if set, is where this tenant's function pods and
                  Services run; empty means they run in spec.namespace. Generalizes the
                  deprecated cluster-global FISSION_FUNCTION_NAMESPACE to a per-tenant
                  mapping.
                maxLength: 63
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                type: string
              namespace:
                description: |-
                  Namespace is the Kubernetes namespace this tenant onboards. It is the
                  immutable join key to the live Namespace.
                maxLength: 63
                minLength: 1
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                type: string
                x-kubernetes-validations:
                - message: spec.namespace is immutable
                  rule: self == oldSelf
            required:
            - namespace
            type: object
          status:
            description: FissionTenantStatus reports the controller's progress onboarding
              the tenant.
            properties:
              conditions:
                description: |-
                  Conditions are the latest observations of the tenant's state:
                  RBACProvisioned, ServiceAccountsReady, AuthKeyProvisioned, WatchActive,
                  and the Ready rollup.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the spec generation the controller
                  last reconciled.
                format: int64
                type: integer
            type: object
        required:
        - metadata
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

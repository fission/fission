---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: workflowruns.fission.io
spec:
  group: fission.io
  names:
    kind: WorkflowRun
    listKind: WorkflowRunList
    plural: workflowruns
    shortNames:
    - wfr
    singular: workflowrun
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.workflowRef
      name: Workflow
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.startedAt
      name: Started
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          WorkflowRun is one execution of a Workflow. Full step history lives in
          the statestore EventLog stream for the run, never in etcd; status carries
          a bounded tail for kubectl visibility.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WorkflowRunSpec identifies the Workflow to execute and the
              run's input.
            properties:
              input:
                description: |-
                  Input is the run's initial input document, webhook-capped at 256KiB
                  (etcd objects cap at ~1.5MiB) — pass larger inputs by reference.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              workflowGeneration:
                description: |-
                  WorkflowGeneration records (for observability) which Workflow
                  generation this run executes. It is NOT the pinning mechanism: the
                  authoritative spec is the snapshot the engine embeds in the run's
                  event stream at RunStarted; a Workflow edit or deletion mid-run can
                  neither fork nor strand a run. Set by the CLI; 0 means unknown.
                format: int64
                type: integer
              workflowRef:
                description: WorkflowRef names the Workflow (same namespace) this
                  run executes.
                type: string
            required:
            - workflowRef
            type: object
          status:
            description: WorkflowRunStatus describes the observed state of a WorkflowRun.
            properties:
              activeStates:
                description: ActiveStates lists the state names currently executing.
                items:
                  type: string
                type: array
              cause:
                maxLength: 1024
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              errorType:
                description: |-
                  ErrorType and Cause carry the terminal failure classification so
                  kubectl answers "why did it fail" without the history endpoint.
                  Cause is bounded; the full detail lives in the run history.
                type: string
              finishedAt:
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              output:
                description: |-
                  Output holds the final output inline up to the step-I/O spill
                  threshold; larger outputs spill to the statestore KV and OutputRef
                  points there (the CLI dereferences).
                type: object
                x-kubernetes-preserve-unknown-fields: true
              outputRef:
                type: string
              phase:
                description: WorkflowRunPhase is the run's coarse lifecycle phase.
                enum:
                - Pending
                - Running
                - Succeeded
                - Failed
                - Cancelled
                - TimedOut
                type: string
              recentEvents:
                description: |-
                  RecentEvents is a bounded (<=20) tail; full history is in the
                  EventLog.
                items:
                  description: |-
                    WorkflowRunEventSummary is one bounded-tail history entry for kubectl
                    visibility; the full history lives in the statestore EventLog.
                  properties:
                    at:
                      format: date-time
                      type: string
                    attempt:
                      format: int32
                      type: integer
                    note:
                      type: string
                    seq:
                      format: int64
                      type: integer
                    state:
                      type: string
                    type:
                      type: string
                  required:
                  - at
                  - seq
                  - type
                  type: object
                type: array
              startedAt:
                format: date-time
                type: string
            type: object
        required:
        - metadata
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

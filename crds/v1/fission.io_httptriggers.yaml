---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: httptriggers.fission.io
spec:
  group: fission.io
  names:
    kind: HTTPTrigger
    listKind: HTTPTriggerList
    plural: httptriggers
    singular: httptrigger
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: HTTPTrigger is the trigger invokes user functions when receiving
          HTTP requests.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: HTTPTriggerSpec is for router to expose user functions at
              the given URL path.
            properties:
              corsConfig:
                description: |-
                  CorsConfig configures CORS response headers for browser
                  callers of this trigger. When nil, the router emits no
                  Access-Control-* headers and the browser's Same-Origin
                  Policy enforces cluster isolation from cross-origin pages
                  (the deny-by-default behaviour). Set this field to
                  allowlist specific origins for SPAs that legitimately
                  call this trigger cross-origin.
                properties:
                  allowCredentials:
                    description: |-
                      AllowCredentials sets Access-Control-Allow-Credentials.
                      When true, AllowOrigins MUST NOT contain "*".
                    type: boolean
                  allowHeaders:
                    description: |-
                      AllowHeaders is the list of request headers the browser is
                      allowed to send, echoed in Access-Control-Allow-Headers.
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                  allowMethods:
                    description: |-
                      AllowMethods is the list of HTTP methods echoed in the
                      Access-Control-Allow-Methods preflight response. When empty
                      the trigger's existing Methods field is used.
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                  allowOrigins:
                    description: |-
                      AllowOrigins is the list of allowed origins (scheme + host +
                      port). Use ["*"] to allow any origin. Mixing "*" with
                      AllowCredentials=true is a configuration error and is
                      rejected by validation; browsers refuse the response in that
                      combination.
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                  exposeHeaders:
                    description: |-
                      ExposeHeaders is the list of response headers exposed to
                      the browser, set in Access-Control-Expose-Headers.
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                  maxAge:
                    description: |-
                      MaxAge is the preflight cache lifetime as parsed by
                      time.ParseDuration. Empty means the header is omitted.
                    type: string
                type: object
                x-kubernetes-validations:
                - message: corsConfig.allowOrigins=["*"] cannot be combined with allowCredentials=true;
                    browsers refuse the response
                  rule: '!(has(self.allowCredentials) && self.allowCredentials &&
                    has(self.allowOrigins) && ''*'' in self.allowOrigins)'
              createingress:
                description: |-
                  If CreateIngress is true, router will create an ingress definition.
                  Deprecated: the Kubernetes Ingress API is frozen. Use RouteConfig
                  (with Provider "gateway") to expose functions through the Gateway API
                  instead. CreateIngress + IngressConfig keep working for the
                  deprecation window but will be removed in a future release.
                type: boolean
              functionref:
                description: FunctionReference is a reference to the target function.
                properties:
                  functionweights:
                    additionalProperties:
                      type: integer
                    description: |-
                      Function Reference by weight. this map contains function name as key and its weight
                      as the value. This is for canary upgrade purpose.
                    nullable: true
                    type: object
                  name:
                    description: |-
                      Name of the function. Bounded to a DNS-1123 label length: the CEL
                      rule on this type needs the schema bound so the apiserver's cost
                      estimator can price the regex — without it, embedding the type
                      under a map (WorkflowSpec.States) blows the per-CRD cost budget.
                    maxLength: 63
                    type: string
                  type:
                    description: |-
                      Type indicates whether this function reference is by name or selector. For now,
                      the only supported reference type is by "name".  Future reference types:
                        * Function by label or annotation
                        * Branch or tag of a versioned function
                        * A "rolling upgrade" from one version of a function to another
                      Available value:
                      - name
                      - function-weights
                    enum:
                    - name
                    - function-weights
                    type: string
                required:
                - name
                - type
                type: object
                x-kubernetes-validations:
                - message: functionref.name must be a valid DNS1123 label (lowercase
                    alphanumeric or '-', start/end alphanumeric, max 63 chars) when
                    type is 'name'
                  rule: self.type != 'name' || (self.name.size() <= 63 && self.name.matches('^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'))
              host:
                description: |-
                  Deprecated: the original idea of this field is not for setting Ingress.
                  Since we have IngressConfig now, remove Host after couple releases.
                pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*)?$
                type: string
              ingressconfig:
                description: |-
                  IngressConfig for router to set up Ingress.
                  Deprecated: superseded by RouteConfig. See CreateIngress.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: Annotations will be added to metadata when creating
                      Ingress.
                    nullable: true
                    type: object
                  host:
                    description: |-
                      Host is for ingress controller to apply rules. If
                      host is empty or "*", the rule applies to all
                      inbound HTTP traffic.
                    type: string
                  path:
                    description: |-
                      Path is for path matching. The format of path
                      depends on what ingress controller you used.
                    type: string
                  tls:
                    description: |-
                      TLS is for user to specify a Secret that contains
                      TLS key and certificate. The domain name in the
                      key and crt must match the value of Host field.
                    type: string
                type: object
                x-kubernetes-validations:
                - message: ingressconfig.path must be an absolute path (start with
                    '/')
                  rule: '!has(self.path) || self.path == '''' || self.path.startsWith(''/'')'
                - message: ingressconfig.host must be empty, '*', a valid DNS1123
                    subdomain, or a wildcard DNS1123 subdomain (e.g. *.example.com)
                  rule: '!has(self.host) || self.host == '''' || self.host == ''*''
                    || self.host.matches(r''^(\*\.)?[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$'')'
              invocationMode:
                description: |-
                  InvocationMode, when "async", forces every request to this trigger into
                  RFC-0024 asynchronous invocation even without the X-Fission-Invoke-Mode
                  header (webhooks from third parties cannot set headers). "" (the default)
                  leaves the per-request header in control.
                enum:
                - ""
                - async
                type: string
              keepPrefix:
                description: |-
                  When function is exposed with Prefix based path,
                  keepPrefix decides whether to keep or trim prefix in URL while invoking function.
                type: boolean
              method:
                description: |-
                  Use Methods instead of Method. This field is going to be deprecated in a future release
                  HTTP method to access a function.
                enum:
                - ""
                - GET
                - HEAD
                - POST
                - PUT
                - PATCH
                - DELETE
                - CONNECT
                - OPTIONS
                - TRACE
                type: string
              methods:
                description: HTTP methods to access a function
                items:
                  enum:
                  - GET
                  - HEAD
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - CONNECT
                  - OPTIONS
                  - TRACE
                  type: string
                type: array
                x-kubernetes-list-type: set
              prefix:
                description: |-
                  Prefix with which functions are exposed.
                  NOTE: Prefix takes precedence over URL/RelativeURL.
                  Note that it does not treat slashes specially ("/foobar/" will be matched by
                  the prefix "/foobar").
                type: string
              relativeurl:
                description: RelativeURL is the exposed URL for external client to
                  access a function with.
                type: string
              routeConfig:
                description: |-
                  RouteConfig declares how the router exposes this trigger through an
                  external route provider (Ingress or the Gateway API). It is the
                  provider-neutral successor to CreateIngress + IngressConfig: when set
                  it takes precedence over those fields. Leave nil to expose the
                  function only through the router's own URL.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: |-
                      Annotations are added to the generated route object (Ingress or
                      HTTPRoute). Use these for implementation-specific configuration
                      understood by your Ingress controller or Gateway implementation.
                    nullable: true
                    type: object
                  gateway:
                    description: |-
                      Gateway holds Gateway-API-specific configuration. Required (at least
                      one parentRef) when Provider is "gateway", unless the router is
                      configured with a default Gateway parentRef.
                    properties:
                      parentRefs:
                        description: |-
                          ParentRefs are the Gateways the generated HTTPRoute attaches to. The
                          referenced Gateways are owned by the cluster operator (Fission does
                          not create Gateways or GatewayClasses). A cross-namespace parentRef
                          requires a ReferenceGrant in the Gateway's namespace.
                        items:
                          description: |-
                            GatewayParentRef references a Gateway (and optionally a specific listener)
                            that the generated HTTPRoute attaches to. It mirrors the subset of
                            gateway.networking.k8s.io ParentReference that Fission needs.
                          properties:
                            name:
                              description: Name of the parent Gateway.
                              type: string
                            namespace:
                              description: |-
                                Namespace of the parent Gateway. Defaults to the router's namespace
                                when empty. A non-empty, different namespace needs a ReferenceGrant.
                              type: string
                            port:
                              description: Port narrows attachment to a specific Gateway
                                listener port.
                              format: int32
                              maximum: 65535
                              minimum: 1
                              type: integer
                            sectionName:
                              description: |-
                                SectionName selects a specific listener on the Gateway. Empty attaches
                                to all compatible listeners.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                    type: object
                  hostnames:
                    description: |-
                      Hostnames the route matches. For the gateway provider these become
                      the HTTPRoute hostnames; for the ingress provider only the first is
                      used as the Ingress rule host. Empty matches all hosts.
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                  path:
                    description: |-
                      Path is the request path the route matches (must be absolute, start
                      with '/'). Defaults to "/" when empty.
                    type: string
                  provider:
                    description: |-
                      Provider selects the route provider that reconciles this trigger's
                      external route. "ingress" creates a networking.k8s.io Ingress (the
                      deprecated path); "gateway" creates a gateway.networking.k8s.io
                      HTTPRoute attached to an operator-managed Gateway. The "gateway"
                      provider must be enabled on the router (GATEWAY_API_ENABLED).
                    enum:
                    - ingress
                    - gateway
                    type: string
                  tls:
                    description: |-
                      TLS names a Secret holding the TLS key and certificate. It applies to
                      the ingress provider only; with the gateway provider TLS termination
                      is configured on the Gateway listener and this field is ignored.
                    type: string
                required:
                - provider
                type: object
                x-kubernetes-validations:
                - message: routeConfig.path must be an absolute path (start with '/')
                  rule: '!has(self.path) || self.path == '''' || self.path.startsWith(''/'')'
                - message: routeConfig.gateway.parentRefs must list at least one Gateway
                    when provider is 'gateway' (unless the router is configured with
                    a default Gateway)
                  rule: self.provider != 'gateway' || (has(self.gateway) && size(self.gateway.parentRefs)
                    > 0)
                - message: routeConfig.tls applies to the ingress provider only; gateway
                    TLS is configured on the Gateway listener
                  rule: self.provider != 'gateway' || !has(self.tls) || self.tls ==
                    ''
            required:
            - functionref
            type: object
            x-kubernetes-validations:
            - message: 'HTTPTriggerSpec: at least one of relativeurl or prefix must
                be set'
              rule: self.relativeurl != '' || (has(self.prefix) && self.prefix !=
                '')
            - message: HTTPTriggerSpec.relativeurl must start with '/', not be '/',
                not contain '..' path segments, not collide with a router-owned path
                (/router-healthz, /readyz, /_version, /auth/login), and not start
                with /fission-function/
              rule: self.relativeurl == '' || (self.relativeurl.startsWith('/') &&
                self.relativeurl != '/' && !self.relativeurl.matches('(^|/)[.][.](/|$)')
                && !(self.relativeurl in ['/router-healthz','/readyz','/_version','/auth/login'])
                && !self.relativeurl.startsWith('/fission-function/'))
            - message: HTTPTriggerSpec.prefix must start with '/', not be '/', not
                contain '..' path segments, not collide with a router-owned path (/router-healthz,
                /readyz, /_version, /auth/login), and not start with /fission-function/
              rule: '!has(self.prefix) || self.prefix == '''' || (self.prefix.startsWith(''/'')
                && self.prefix != ''/'' && !self.prefix.matches(''(^|/)[.][.](/|$)'')
                && !(self.prefix in [''/router-healthz'',''/readyz'',''/_version'',''/auth/login''])
                && !self.prefix.startsWith(''/fission-function/''))'
          status:
            description: HTTPTriggerStatus describes the observed state of an HTTPTrigger.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                format: int64
                type: integer
            type: object
        required:
        - metadata
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

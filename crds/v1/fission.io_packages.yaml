---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: packages.fission.io
spec:
  group: fission.io
  names:
    kind: Package
    listKind: PackageList
    plural: packages
    shortNames:
    - pkg
    singular: package
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: Package Think of these as function-level images.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PackageSpec includes source/deploy archives and the reference
              of environment to build the package.
            properties:
              buildcmd:
                description: BuildCommand is a custom build command that builder used
                  to build the source archive.
                type: string
              deployment:
                description: Deployment is the deployable archive that environment
                  runtime used to run user function.
                properties:
                  checksum:
                    description: |-
                      Checksum ensures the integrity of packages
                      referenced by URL. Ignored for literals.
                    properties:
                      sum:
                        type: string
                      type:
                        description: |-
                          ChecksumType specifies the checksum algorithm, such as
                          sha256, used for a checksum.
                        type: string
                    type: object
                  literal:
                    description: |-
                      Literal contents of the package. Can be used for
                      encoding packages below TODO (256 KB?) size.
                    format: byte
                    type: string
                  type:
                    description: |-
                      Type defines how the package is specified: literal or URL.
                      Available value:
                       - literal
                       - url
                    type: string
                  url:
                    description: URL references a package.
                    type: string
                type: object
              environment:
                description: Environment is a reference to the environment for building
                  source archive.
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                - namespace
                type: object
              source:
                description: |-
                  Source is the archive contains source code and dependencies file.
                  If the package status is in PENDING state, builder manager will then
                  notify builder to compile source and save the result as deployable archive.
                properties:
                  checksum:
                    description: |-
                      Checksum ensures the integrity of packages
                      referenced by URL. Ignored for literals.
                    properties:
                      sum:
                        type: string
                      type:
                        description: |-
                          ChecksumType specifies the checksum algorithm, such as
                          sha256, used for a checksum.
                        type: string
                    type: object
                  literal:
                    description: |-
                      Literal contents of the package. Can be used for
                      encoding packages below TODO (256 KB?) size.
                    format: byte
                    type: string
                  type:
                    description: |-
                      Type defines how the package is specified: literal or URL.
                      Available value:
                       - literal
                       - url
                    type: string
                  url:
                    description: URL references a package.
                    type: string
                type: object
            required:
            - environment
            type: object
          status:
            description: Status indicates the build status of package.
            properties:
              buildlog:
                description: BuildLog stores build log during the compilation.
                type: string
              buildstatus:
                default: pending
                description: BuildStatus is the package build status.
                type: string
              conditions:
                description: Conditions represent the latest observations of the package's
                  state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastUpdateTimestamp:
                description: |-
                  LastUpdateTimestamp will store the timestamp the package was last updated
                  metav1.Time is a wrapper around time.Time which supports correct marshaling to YAML and JSON.
                  https://github.com/kubernetes/apimachinery/blob/44bd77c24ef93cd3a5eb6fef64e514025d10d44e/pkg/apis/meta/v1/time.go#L26-L35
                format: date-time
                nullable: true
                type: string
            type: object
        required:
        - metadata
        - spec
        type: object
    served: true
    storage: true

# Absolute pass/fail bounds for `fission-benchmark report --thresholds`.
# These are conservative starting points so CI does not false-fail; the gh-pages
# trend dashboard catches gradual regressions that absolute bars miss. Tighten
# as a stable baseline is established. Relative version-vs-version regression
# checks live in `fission-benchmark compare --fail-on-regression`.
scenarios:
  warm-path:
    metrics:
      error_rate: { max: 0.02 } # <2% failed requests under steady load
  concurrency-sweep:
    metrics:
      c50_error_rate: { max: 0.05 }
      # A warm sweep should trigger ~zero specializations; the c500 saturation
      # storm measured 86-88 (runs 28775891057 / 29085940648) — this bar
      # catches its return. Optional: the metric is Prometheus-derived and
      # absent when capture is off or the counter reset mid-run.
      specializations: { max: 10, optional: true }
  cold-start-poolmgr:
    metrics:
      failures: { max: 5 } # at most 5 of N iterations may fail to specialize
  cold-burst-same-fn:
    metrics:
      failures: { max: 3 } # of burstSize concurrent first-requests
  cold-burst-distinct-fn:
    metrics:
      failures: { max: 3 }

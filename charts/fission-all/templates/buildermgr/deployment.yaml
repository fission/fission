apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildermgr
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    svc: buildermgr
spec:
  replicas: {{ dig "replicas" 1 (.Values.buildermgr | default dict) }}
  selector:
    matchLabels:
      svc: buildermgr
  template:
    metadata:
      labels:
        svc: buildermgr
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      {{- if .Values.buildermgr.securityContext.enabled }}
      securityContext: {{- omit .Values.buildermgr.securityContext "enabled" | toYaml | nindent 8 }}
      {{- end }}
      containers:
      - name: buildermgr
        image: {{ include "fission-bundleImage" . | quote }}
        imagePullPolicy: {{ .Values.pullPolicy }}
        command: ["/fission-bundle"]
        args: ["--builderMgr", "--storageSvcUrl", "http://storagesvc.{{ .Release.Namespace }}"]
        env:
        {{- include "fission.podNamespaceEnv" . | nindent 8 }}
        {{- include "leaderElection.envs" (dict "enabled" (dig "leaderElection" "enabled" false (.Values.buildermgr | default dict))) | indent 8 }}
        - name: FETCHER_IMAGE
          value: {{ include "fetcherImage" . | quote }}
        {{- if .Values.packageRegistry.enabled }}
        - name: PACKAGE_REGISTRY_ENABLED
          value: "true"
        - name: PACKAGE_REGISTRY_REPOSITORY_PREFIX
          value: {{ required "packageRegistry.repositoryPrefix is required when packageRegistry.enabled" .Values.packageRegistry.repositoryPrefix | quote }}
        - name: PACKAGE_REGISTRY_PUBLISHED_PREFIX
          value: {{ .Values.packageRegistry.publishedPrefix | default "" | quote }}
        - name: PACKAGE_REGISTRY_PUSH_SECRET
          value: {{ .Values.packageRegistry.pushSecret | quote }}
        - name: PACKAGE_REGISTRY_PULL_SECRET
          value: {{ .Values.packageRegistry.pullSecret | quote }}
        - name: PACKAGE_REGISTRY_INSECURE_HOSTS
          value: {{ .Values.packageRegistry.insecureHosts | quote }}
        {{- /* sprig default would eat an explicit false; render if/else. */}}
        - name: PACKAGE_REGISTRY_FALLBACK_TO_STORAGE
          value: {{ if hasKey .Values.packageRegistry "fallbackToStorage" }}{{ if .Values.packageRegistry.fallbackToStorage }}"true"{{ else }}"false"{{ end }}{{ else }}"true"{{ end }}
        {{- end }}
        - name: FETCHER_IMAGE_PULL_POLICY
          value: "{{ .Values.pullPolicy }}"
        - name: BUILDER_IMAGE_PULL_POLICY
          value: "{{ .Values.pullPolicy }}"
        - name: ENABLE_ISTIO
          value: "{{ .Values.enableIstio }}"
        - name: FETCHER_MINCPU
          value: {{ .Values.fetcher.resource.cpu.requests | quote }}
        - name: FETCHER_MINMEM
          value: {{ .Values.fetcher.resource.mem.requests | quote }}
        - name: FETCHER_MAXCPU
          value: {{ .Values.fetcher.resource.cpu.limits | quote }}
        - name: FETCHER_MAXMEM
          value: {{ .Values.fetcher.resource.mem.limits | quote }}
        - name: DEBUG_ENV
          value: {{ .Values.debugEnv | quote }}
        - name: DISABLE_OWNER_REFERENCES
          value: {{ .Values.disableOwnerReference | quote }}
        - name: PPROF_ENABLED
          value: {{ .Values.pprof.enabled | quote }}
        - name: HELM_RELEASE_NAME
          value: {{ .Release.Name | quote }}
        {{- include "fission-resource-namespace.envs" . | indent 8 }}
        {{- include "kube_client.envs" . | indent 8 }}
        {{- include "opentelemtry.envs" . | indent 8 }}
        {{- include "internalAuth.envs" . | indent 8 }}
        {{- include "coverage.envs" . | indent 8 }}
        {{- if or .Values.builderPodSpec.enabled .Values.coverage.enabled }}
        volumeMounts:
        {{- if .Values.builderPodSpec.enabled }}
        - name: builder-podspec-patch-volume
          mountPath: /etc/fission/builder-podspec-patch.yaml
          subPath: builder-podspec-patch.yaml
          readOnly: true
        {{- end }}
        {{- include "coverage.volumemount" . | indent 8 }}
        {{- end }}
        ports:
          - containerPort: 8080
            name: metrics
          - containerPort: 8081
            name: health
        livenessProbe:
          httpGet:
            path: "/healthz"
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: "/readyz"
            port: 8081
          initialDelaySeconds: 1
          periodSeconds: 5
          failureThreshold: 30
        resources:
          {{- toYaml .Values.buildermgr.resources | nindent 10 }}
        {{- if .Values.terminationMessagePath }}
        terminationMessagePath: {{ .Values.terminationMessagePath }}
        {{- end }}
        {{- if .Values.terminationMessagePolicy }}
        terminationMessagePolicy: {{ .Values.terminationMessagePolicy }}
        {{- end }}
      serviceAccountName: fission-buildermgr
      {{- if or .Values.builderPodSpec.enabled .Values.coverage.enabled }}
      volumes:
      {{- if .Values.builderPodSpec.enabled }}
      - name: builder-podspec-patch-volume
        configMap:
          name: builder-podspec-patch
      {{- end }}
      {{- include "coverage.volume" . | indent 6 }}
      {{- end }}
{{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
{{- end }}
    {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
{{- if .Values.extraCoreComponentPodConfig }}
{{ toYaml .Values.extraCoreComponentPodConfig | indent 6 -}}
{{- end }}
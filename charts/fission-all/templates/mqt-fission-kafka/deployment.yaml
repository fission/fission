{{- if .Values.kafka.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtrigger-kafka
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    svc: mqtrigger
    messagequeue: kafka
spec:
  replicas: {{ dig "replicas" 1 (.Values.kafka | default dict) }}
  selector:
    matchLabels:
      svc: mqtrigger
      messagequeue: kafka
  template:
    metadata:
      labels:
        svc: mqtrigger
        messagequeue: kafka
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      containers:
      - name: mqtrigger
        image: {{ include "fission-bundleImage" . | quote }}
        imagePullPolicy: {{ .Values.pullPolicy }}
        command: ["/fission-bundle"]
        args: ["--mqt", "--routerUrl", "http://router.{{ .Release.Namespace }}"]
        ports:
          - containerPort: 8080
            name: metrics
        env:
        {{- include "fission.podNamespaceEnv" . | nindent 8 }}
        {{- include "leaderElection.envs" (dict "enabled" (dig "leaderElection" "enabled" false (.Values.kafka | default dict))) | indent 8 }}
        - name: MESSAGE_QUEUE_TYPE
          value: kafka
        - name: MESSAGE_QUEUE_URL
          value: "{{.Values.kafka.brokers}}"
        - name: MESSAGE_QUEUE_KAFKA_VERSION
          value: "{{.Values.kafka.version}}"
        - name: DEBUG_ENV
          value: {{ .Values.debugEnv | quote }}
        - name: PPROF_ENABLED
          value: {{ .Values.pprof.enabled | quote }}
        # /fission-function/<ns>/<name> lives only on the router's
        # internal listener (GHSA-3g33-6vg6-27m8). The kafka consumer
        # signs each invocation when FISSION_INTERNAL_AUTH_SECRET is
        # set (mounted by internalAuth.envs).
        - name: ROUTER_INTERNAL_URL
          value: {{ include "fission.routerInternalURL" . | quote }}
        # RFC-0027 broker egress: with a statestore, the kafka head also drains
        # the durable mq-egress-kafka queue (broker-destined topic destinations
        # enqueued by the router's async dispatcher). Wiring mirrors the router:
        # embedded -> the capability service over HTTP, external -> Postgres.
        # Without a statestore the bundle skips the egress loop.
        {{- if .Values.statestore.enabled }}
        {{- if eq .Values.statestore.mode "embedded" }}
        - name: STATESTORE_DRIVER
          value: "client"
        - name: STATESTORE_DSN
          value: "http://statestore.{{ .Release.Namespace }}:{{ include "fission.statestorePort" . }}"
        {{- else if eq .Values.statestore.mode "external" }}
        - name: STATESTORE_DRIVER
          value: "postgres"
        - name: STATESTORE_DSN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.statestore.external.existingSecret | default "statestore-postgres" }}
              key: dsn
        {{- end }}
        {{- end }}
        {{- include "fission-resource-namespace.envs" . | indent 8 }}
        {{- include "opentelemtry.envs" . | indent 8 }}
        {{- include "internalAuth.envs" . | indent 8 }}
        {{- include "coverage.envs" . | indent 8 }}
        # TLS authentication is TLS with authentication (2 way)
        # More info: https://docs.confluent.io/current/kafka/authentication_ssl.html#ssl-overview
        {{- if .Values.kafka.authentication.tls.enabled }}
        - name: TLS_ENABLED
          value: "true"
        - name: MESSAGE_QUEUE_SECRETS
          value: /etc/fission/secrets
        - name: INSECURE_SKIP_VERIFY
          value: "{{ .Values.kafka.authentication.tls.insecureSkipVerify }}"
        {{- end }}
        {{- if or .Values.kafka.authentication.tls.enabled .Values.coverage.enabled }}
        volumeMounts:
        {{- if .Values.kafka.authentication.tls.enabled }}
        - name: kafka-secrets
          mountPath: /etc/fission/secrets
        {{- end }}
        {{- include "coverage.volumemount" . | indent 8 }}
        {{- end }}
        {{- if .Values.terminationMessagePath }}
        terminationMessagePath: {{ .Values.terminationMessagePath }}
        {{- end }}
        {{- if .Values.terminationMessagePolicy }}
        terminationMessagePolicy: {{ .Values.terminationMessagePolicy }}
        {{- end }}
      serviceAccountName: fission-kafka
      {{- if or .Values.kafka.authentication.tls.enabled .Values.coverage.enabled }}
      volumes:
      {{- if .Values.kafka.authentication.tls.enabled }}
      - name: kafka-secrets
        secret:
          secretName: mqtrigger-kafka-secrets
      {{- end }}
      {{- include "coverage.volume" . | indent 6 }}
      {{- end }}
    {{- with .Values.imagePullSecrets }}
      imagePullSecrets: 
        {{- toYaml . | nindent 8 }}
    {{- end }}


---
{{- if .Values.kafka.authentication.tls.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: mqtrigger-kafka-secrets
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
data:
  {{- if .Files.Get  (printf "%s" .Values.kafka.authentication.tls.caCert) }}
  caCert: {{ .Files.Get (printf "%s" .Values.kafka.authentication.tls.caCert) | b64enc }}
  {{- else }}
  {{ fail "Invalid chart. CA Certificate not found." }}
  {{- end }}
  {{- if .Files.Get (printf "%s" .Values.kafka.authentication.tls.userCert) }}
  userCert: {{ .Files.Get (printf "%s" .Values.kafka.authentication.tls.userCert) | b64enc }}
  {{- else }}
  {{ fail "Invalid chart. User Certificate not found." }}
  {{- end }}
  {{- if .Files.Get (printf "%s" .Values.kafka.authentication.tls.userKey) }}
  userKey: {{ .Files.Get (printf "%s" .Values.kafka.authentication.tls.userKey) | b64enc }}
  {{- else }}
  {{ fail "Invalid chart. User Key not found." }}
  {{- end }}
{{- end }}
{{- if .Values.extraCoreComponentPodConfig }}
{{ toYaml .Values.extraCoreComponentPodConfig | indent 6 -}}
{{- end }}
{{- end }}
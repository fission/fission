{{- if .Values.tenantController.enabled }}
# The tenant controller's only cluster-wide grant: read/write Fission's own
# FissionTenant CRD and read Namespaces. Both are cluster-scoped types; this
# touches no core/workload type (no pods/secrets/configmaps), so it is the
# least-privilege cluster grant the dynamic-watch design needs. Per-namespace
# RBAC provisioning (and the escalate/bind it requires) is a later phase.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-fission-tenant-controller
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
rules:
- apiGroups:
  - fission.io
  resources:
  - fissiontenants
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - fission.io
  resources:
  - fissiontenants/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
# Provision per-namespace RoleBindings for runtime-onboarded tenants and reap them
# on offboard. The controller BINDS the fixed-name *-tenant-workload ClusterRoles
# (the rules live in the chart, not the controller) — it authors NO Role of its
# own, so it deliberately holds NEITHER `create` on roles NOR `escalate`. It can
# therefore grant the fixed fetcher/builder rule shapes but can never mint a Role
# with arbitrary rules — the least-privilege posture the dynamic-watch design
# targets. The ValidatingAdmissionPolicy in admission-policy.yaml further pins
# which ServiceAccounts those bindings may name.
#
# rolebindings: create (provision) + deletecollection (the label-selected
# DeleteAllOf teardown); deletecollection is a distinct verb `delete` does not imply.
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - rolebindings
  verbs:
  - create
  - delete
  - deletecollection
# roles: delete-only, solely to reap any legacy per-namespace Roles a
# pre-unification controller authored before this revision started binding
# ClusterRoles. The controller never creates a Role.
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - roles
  verbs:
  - delete
  - deletecollection
# Bind ONLY the fixed-name tenant-workload ClusterRoles into tenant namespaces (via
# the RoleBindings the controller provisions): the executor/buildermgr workload
# roles AND the fetcher/builder/fetcher-websocket function-pod read roles.
# resourceNames-scoped: the controller cannot bind any other ClusterRole, so it
# cannot escalate itself to arbitrary cluster permissions.
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  verbs:
  - bind
  resourceNames:
  - fission-executor-tenant-workload
  - fission-buildermgr-tenant-workload
  - fission-fetcher-tenant-workload
  - fission-builder-tenant-workload
  - fission-fetcher-websocket-tenant-workload
- apiGroups:
  - ""
  resources:
  - serviceaccounts
  verbs:
  - get
  - list
  - watch
  - create
  - delete
  # deletecollection backs the offboard teardown (see roles/rolebindings above).
  - deletecollection
# Write-only access to the per-namespace derived-key Secret: create + delete by
# NAME only — deliberately NO get/list/watch, so the controller can provision and
# remove the auth secret without being able to read any tenant secret. This keeps
# the controller's blast radius minimal even though it writes secret material.
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-fission-tenant-controller
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-fission-tenant-controller
subjects:
- kind: ServiceAccount
  name: fission-tenant-controller
  namespace: {{ .Release.Namespace }}
---
# Leader-election lease + event recorder, namespaced to the release namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-fission-tenant-controller
  namespace: {{ .Release.Namespace }}
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
rules:
{{- include "leases-kuberules" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-fission-tenant-controller
  namespace: {{ .Release.Namespace }}
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-fission-tenant-controller
subjects:
- kind: ServiceAccount
  name: fission-tenant-controller
  namespace: {{ .Release.Namespace }}
{{- end }}

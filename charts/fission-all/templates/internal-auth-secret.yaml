{{- if .Values.internalAuth.enabled }}
{{- /*
fission-internal-auth holds the shared secret used by Fission's internal
HMAC application-layer auth (RFC-0004). The secret is preserved across
helm upgrades via `lookup`, so the random value generated on first install
is stable for the life of the release. Operators rotate it by setting
.Values.internalAuth.secret (and optionally .Values.internalAuth.oldSecret
during the rotation window).
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: fission-internal-auth
  namespace: {{ .Release.Namespace }}
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    application: fission-internal-auth
type: Opaque
data:
{{- if .Values.internalAuth.secret }}
  secret: {{ .Values.internalAuth.secret | b64enc }}
{{- else }}
  {{- /*
  Preserve the existing secret value across helm upgrades. randAlphaNum
  alone would regenerate on every upgrade and break every running pod that
  was signed with the previous secret.
  */}}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace "fission-internal-auth" }}
  {{- if and $existing $existing.data $existing.data.secret }}
  secret: {{ $existing.data.secret }}
  {{- else }}
  secret: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
{{- end }}
{{- if .Values.internalAuth.oldSecret }}
  oldSecret: {{ .Values.internalAuth.oldSecret | b64enc }}
{{- end }}
{{- end }}

{{- if .Values.internalAuth.enabled }}
{{- /*
fission-internal-auth holds the shared HMAC secret used by Fission's
internal application-layer auth (the design at docs/internal-auth/00-design.md).

The Secret (the HMAC master) is replicated into every namespace where Fission
runs pods that need to sign storagesvc requests: the install namespace plus
.Values.defaultNamespace plus each .Values.additionalFissionNamespaces.
Cross-namespace secretKeyRef isn't supported by kubelet, so per-namespace
copies are the simplest way to make the env vars resolve in dynamically
created builder and function pods.

Under multi-namespace tenancy (.Values.tenancy.dynamicNamespaces) the master is
replicated ONLY into the install namespace — the control plane. Tenant
namespaces instead receive a controller-owned derived-key Secret
(fission-internal-auth-keys, see pkg/tenant) holding only their own per-namespace
keys, never the master. This is the isolation end state: a fully compromised
tenant namespace yields keys that act only as that tenant on the fetcher/builder/
storagesvc channels, never as the master-derived control-plane channels. On
upgrade into this mode Helm deletes the now-unrendered tenant-namespace master
copies; already-running pods captured their env at start and keep working until
they cycle, and new pods block on the controller-provisioned derived key.

The same value is used in every copy. lookup against the install
namespace preserves the existing value across helm upgrades; randAlphaNum
alone would regenerate on every upgrade and break every running pod
that was signed with the previous secret.

Rotation: bump .Values.internalAuth.secret (and optionally
.Values.internalAuth.oldSecret to the previous value during the
rotation window) and re-run helm upgrade.
*/}}
{{- $secretValue := "" -}}
{{- if .Values.internalAuth.secret -}}
{{-   $secretValue = .Values.internalAuth.secret | b64enc -}}
{{- else -}}
{{-   $existing := lookup "v1" "Secret" .Release.Namespace "fission-internal-auth" -}}
{{-   if and $existing $existing.data $existing.data.secret -}}
{{-     $secretValue = $existing.data.secret -}}
{{-   else -}}
{{-     $secretValue = randAlphaNum 32 | b64enc -}}
{{-   end -}}
{{- end -}}

{{- $namespaces := list .Release.Namespace -}}
{{- /* Under dynamic tenancy the master stays in the control-plane namespace only;
       tenant namespaces get the controller's derived-key Secret instead. */ -}}
{{- if not .Values.tenancy.dynamicNamespaces -}}
{{-   if and .Values.defaultNamespace (ne .Values.defaultNamespace .Release.Namespace) -}}
{{-     $namespaces = append $namespaces .Values.defaultNamespace -}}
{{-   end -}}
{{-   range $ns := .Values.additionalFissionNamespaces -}}
{{-     if not (has $ns $namespaces) -}}
{{-       $namespaces = append $namespaces $ns -}}
{{-     end -}}
{{-   end -}}
{{- end -}}

{{- range $ns := $namespaces }}
---
apiVersion: v1
kind: Secret
metadata:
  name: fission-internal-auth
  namespace: {{ $ns }}
  labels:
    chart: "{{ $.Chart.Name }}-{{ $.Chart.Version }}"
    application: fission-internal-auth
type: Opaque
data:
  secret: {{ $secretValue }}
{{- if $.Values.internalAuth.oldSecret }}
  oldSecret: {{ $.Values.internalAuth.oldSecret | b64enc }}
{{- end }}
{{- end }}
{{- end }}

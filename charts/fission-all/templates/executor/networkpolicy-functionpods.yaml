{{- if .Values.networkPolicy.enabled }}
# Restrict ingress to function pods managed by the executor. Each pod
# carries an `executorType` label set to one of poolmgr / newdeploy /
# container, and listens on two ports:
#   - 8000: fetcher sidecar (executor calls /specialize at pod creation)
#   - 8888: env runtime (router proxies user HTTP-trigger traffic here)
# See pkg/executor/executortype/poolmgr/gp_deployment.go for the port
# definitions and pkg/router/functionHandler.go:639 for the router →
# function service URL flow.
#
# The policy is rendered into the namespace where executor creates
# function pods (`fission-function-ns` helper: functionNamespace if
# set, otherwise defaultNamespace). NetworkPolicy podSelector only
# matches pods in the policy's own namespace, so rendering this in the
# release namespace would make it a no-op when functionNamespace differs
# (e.g. the kind-ci profile sets functionNamespace=fission-function).
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: functionpods-allow-internal
  namespace: {{ include "fission-function-ns" . | quote }}
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    svc: executor
spec:
  podSelector:
    matchExpressions:
      - key: executorType
        operator: In
        values: ["poolmgr", "newdeploy", "container"]
  policyTypes:
    - Ingress
  ingress:
    # executor → fetcher sidecar (POST /specialize), and executor → env
    # runtime (POST /v2/specialize) for poolmgr image-volume pods
    # (RFC-0001 Path B), which carry no fetcher to relay the load call
    # (newdeploy Path B pods keep theirs). executor
    # runs in the release namespace; namespaceSelector: {} permits
    # cross-ns because this policy lives in functionNamespace.
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              svc: executor
      ports:
        - port: 8000
          protocol: TCP
        - port: 8888
          protocol: TCP
    # router → env runtime (user-trigger traffic). Router resolves the
    # function's service URL via executor.GetServiceForFunction and then
    # proxies on the env's port (8888). Router is in the release
    # namespace; same cross-ns rationale as above.
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              application: fission-router
              svc: router
      ports:
        - port: 8888
          protocol: TCP
{{- end }}

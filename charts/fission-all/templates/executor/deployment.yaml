apiVersion: apps/v1
kind: Deployment
metadata:
  name: executor
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    svc: executor
spec:
  replicas: {{ .Values.executor.replicas | default 1 }}
  {{- with .Values.executor.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      svc: executor
  template:
    metadata:
      labels:
        svc: executor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      {{- if .Values.executor.securityContext.enabled }}
      securityContext: {{- omit .Values.executor.securityContext "enabled" | toYaml | nindent 8 }}
      {{- end }}
      containers:
      - name: executor
        image: {{ include "fission-bundleImage" . | quote }}
        imagePullPolicy: {{ .Values.pullPolicy }}
        command: ["/fission-bundle"]
        args: ["--executorPort", "8888"]
        env:
        - name: LEADER_ELECTION_ENABLED
          value: {{ .Values.executor.leaderElection.enabled | default false | quote }}
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: FETCHER_IMAGE
          value: {{ include "fetcherImage" . | quote }}
        - name: FETCHER_IMAGE_PULL_POLICY
          value: "{{ .Values.pullPolicy }}"
        - name: RUNTIME_IMAGE_PULL_POLICY
          value: "{{ .Values.pullPolicy }}"
        - name: ADOPT_EXISTING_RESOURCES
          value: {{ .Values.executor.adoptExistingResources | default false | quote }}
        - name: FINALIZER_ENABLED
          value: {{ .Values.finalizerEnabled | quote }}
        - name: POD_READY_TIMEOUT
          value: {{ .Values.executor.podReadyTimeout | default false | quote }}
        - name: ENABLE_ISTIO
          value: "{{ .Values.enableIstio }}"
        {{- if .Values.functionState.enabled }}
        # RFC-0023: the executor stamps this URL into function pods as
        # FISSION_STATE_URL; unset (feature off) keeps pods byte-identical.
        - name: STATESVC_URL
          value: "http://statesvc.{{ .Release.Namespace }}:{{ include "fission.statesvcPort" . }}"
        {{- end }}
        - name: FETCHER_MINCPU
          value: {{ .Values.fetcher.resource.cpu.requests | quote }}
        - name: FETCHER_MINMEM
          value: {{ .Values.fetcher.resource.mem.requests | quote }}
        - name: FETCHER_MAXCPU
          value: {{ .Values.fetcher.resource.cpu.limits | quote }}
        - name: FETCHER_MAXMEM
          value: {{ .Values.fetcher.resource.mem.limits | quote }}
        {{- /* Function-pod fetchers must trust the producer's registry too:
             a Path A pull of a producer-published package (k8s < 1.33, or
             image volumes off) otherwise fails TLS against an insecure
             registry — two knobs away from the error. Union the lists. */}}
        {{- $insecure := compact (list .Values.fetcher.allowInsecureRegistries .Values.packageRegistry.insecureHosts) }}
        {{- if $insecure }}
        - name: FETCHER_ALLOW_INSECURE_REGISTRIES
          value: {{ join "," $insecure | quote }}
        {{- end }}
        {{- if .Values.executor.enableOCIImageVolume }}
        - name: ENABLE_OCI_IMAGE_VOLUME
          value: {{ .Values.executor.enableOCIImageVolume | quote }}
        {{- end }}
        - name: OCI_POOL_IDLE_REAP_TIME
          value: {{ .Values.executor.ociPoolIdleReapTime | default "5m" | quote }}
        {{- if .Values.executor.functionServices.enabled }}
        - name: ENABLE_FUNCTION_SERVICES
          value: {{ .Values.executor.functionServices.enabled | quote }}
        {{- end }}
        {{- if .Values.executor.specializationConcurrency }}
        - name: EXECUTOR_SPECIALIZATION_CONCURRENCY
          value: {{ .Values.executor.specializationConcurrency | quote }}
        {{- end }}
        {{- if hasKey .Values.executor "maxPendingSpecializations" }}
        - name: EXECUTOR_MAX_PENDING_SPECIALIZATIONS_PER_FUNCTION
          value: {{ .Values.executor.maxPendingSpecializations | quote }}
        {{- end }}
        {{- if .Values.executor.provisionedConcurrency.enabled }}
        - name: EXECUTOR_PROVISIONED_CONCURRENCY_ENABLED
          value: "true"
        - name: EXECUTOR_PROVISIONED_MAX_PER_FUNCTION
          value: {{ .Values.executor.provisionedConcurrency.maxPerFunction | quote }}
        - name: EXECUTOR_PROVISIONED_MAX_INFLIGHT_PER_FUNCTION
          value: {{ .Values.executor.provisionedConcurrency.maxInflightPerFunction | quote }}
        - name: EXECUTOR_PROVISIONED_RECONCILE_INTERVAL
          value: {{ .Values.executor.provisionedConcurrency.reconcileInterval | quote }}
        {{- end }}
        - name: DEBUG_ENV
          value: {{ .Values.debugEnv | quote }}
        - name: PPROF_ENABLED
          value: {{ .Values.pprof.enabled | quote }}
        - name: OBJECT_REAPER_INTERVAL
          value: {{ .Values.executor.objectReaperInterval | quote }}
        {{- if .Values.executor.poolmgr.objectReaperInterval }}
        - name: POOLMGR_OBJECT_REAPER_INTERVAL
          value: {{ .Values.executor.poolmgr.objectReaperInterval | quote }}
        {{- end}}
        {{- if .Values.executor.newdeploy.objectReaperInterval }}
        - name: NEWDEPLOY_OBJECT_REAPER_INTERVAL
          value: {{ .Values.executor.newdeploy.objectReaperInterval | quote }}
        {{- end}}
        {{- if .Values.executor.container.objectReaperInterval }}
        - name: CONTAINER_OBJECT_REAPER_INTERVAL
          value: {{ .Values.executor.container.objectReaperInterval | quote }}
        {{- end}}
        {{- if .Values.executor.serviceAccountCheck.enabled }}
        - name: SERVICEACCOUNT_CHECK_ENABLED
          value: {{ .Values.executor.serviceAccountCheck.enabled | quote }}  
        - name: SERVICEACCOUNT_CHECK_INTERVAL
          value: {{ .Values.executor.serviceAccountCheck.interval | quote }}
        - name: DISABLE_OWNER_REFERENCES
          value: {{ .Values.disableOwnerReference | quote }}
        {{- end}}  
        {{- include "fission-resource-namespace.envs" . | indent 8 }}
        {{- include "kube_client.envs" . | indent 8 }}
        - name: HELM_RELEASE_NAME
          value: {{ .Release.Name | quote }}
        {{- include "opentelemtry.envs" . | indent 8 }}
        {{- include "internalAuth.envs" . | indent 8 }}
        {{- include "coverage.envs" . | indent 8 }}
        resources:
          {{- toYaml .Values.executor.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: "/readyz"
            port: 8888
          initialDelaySeconds: 1
          periodSeconds: 1
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: "/healthz"
            port: 8888
          initialDelaySeconds: 35
          periodSeconds: 5
        {{- if or .Values.runtimePodSpec.enabled .Values.coverage.enabled }}
        volumeMounts:
        {{- if .Values.runtimePodSpec.enabled }}
        - name: runtime-podspec-patch-volume
          mountPath: /etc/fission/runtime-podspec-patch.yaml
          subPath: runtime-podspec-patch.yaml
          readOnly: true
        {{- end }}
        {{- include "coverage.volumemount" . | indent 8 }}
        {{- end }}
        ports:
        - containerPort: 8080
          name: metrics
        - containerPort: 8888
          name: http
        {{- if .Values.pprof.enabled }}
        - containerPort: 6060
          name: pprof
        {{- end }}
        {{- if .Values.executor.terminationMessagePath }}
        terminationMessagePath: {{ .Values.executor.terminationMessagePath }}
        {{- else if .Values.terminationMessagePath }}
        terminationMessagePath: {{ .Values.terminationMessagePath }}
        {{- end }}
        {{- if .Values.executor.terminationMessagePolicy }}
        terminationMessagePolicy: {{ .Values.executor.terminationMessagePolicy }}
        {{- else if .Values.terminationMessagePolicy }}
        terminationMessagePolicy: {{ .Values.terminationMessagePolicy }}
        {{- end }}
      serviceAccountName: fission-executor
      {{- with .Values.executor.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      {{- if or .Values.runtimePodSpec.enabled .Values.coverage.enabled }}
      volumes:
      {{- if .Values.runtimePodSpec.enabled }}
      - name: runtime-podspec-patch-volume
        configMap:
          name: runtime-podspec-patch
      {{- end }}
      {{- include "coverage.volume" . | indent 6 }}
      {{- end }}
{{- if .Values.executor.priorityClassName }}
      priorityClassName: {{ .Values.executor.priorityClassName }}
{{- else if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
{{- end }}
    {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
{{- if .Values.extraCoreComponentPodConfig }}
{{ toYaml .Values.extraCoreComponentPodConfig | indent 6 -}}
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: router
  labels:
    svc: router
    application: fission-router
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    {{- if .Values.router.svcLabels }}
    {{- toYaml (omit .Values.router.svcLabels "svc" "application" "chart") | nindent 4 }}
    {{- end }}
{{- if .Values.router.svcAnnotations }}
  annotations:
{{ toYaml .Values.router.svcAnnotations | indent 4 }}
{{- end }}
spec:
  type: {{ .Values.routerServiceType }}
  ports:
  - name: http
    port: 80
    targetPort: {{ include "fission.routerPort" . }}
{{- if eq .Values.routerServiceType "NodePort" }}
    nodePort: {{ .Values.routerPort }}
{{- end }}
  selector:
    svc: router
---
# router-internal is a separate ClusterIP-only Service so the internal
# port stays cluster-internal regardless of routerServiceType. Keeping
# the internal port on the same Service as the public listener would
# expose /fission-function/<ns>/<name> via NodePort or LoadBalancer
# whenever routerServiceType != ClusterIP — defeating the
# GHSA-3g33-6vg6-27m8 split.
apiVersion: v1
kind: Service
metadata:
  name: router-internal
  labels:
    svc: router-internal
    application: fission-router
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
spec:
  type: ClusterIP
  ports:
  - name: internal
    port: {{ include "fission.routerInternalPort" . }}
    targetPort: {{ include "fission.routerInternalPort" . }}
  selector:
    svc: router

apiVersion: apps/v1
{{- if not .Values.router.deployAsDaemonSet }}
kind: Deployment
{{- else }}
kind: DaemonSet
{{- end }}
metadata:
  name: router
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    svc: router
    application: fission-router
spec:
{{- if not .Values.router.deployAsDaemonSet }}
  replicas: {{ .Values.router.replicas | default 1 }}
  {{- with .Values.router.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
  selector:
    matchLabels:
      application: fission-router
      svc: router
  template:
    metadata:
      labels:
        application: fission-router
        svc: router
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      {{- if .Values.router.securityContext.enabled }}
      securityContext: {{- omit .Values.router.securityContext "enabled" | toYaml | nindent 8 }}
      {{- end }}
      containers:
      - name: router
        image: {{ include "fission-bundleImage" . | quote }}
        imagePullPolicy: {{ .Values.pullPolicy }}
        command: ["/fission-bundle"]
        args:
          - "--routerPort"
          - {{ include "fission.routerPort" . | quote }}
          - "--routerInternalPort"
          - {{ include "fission.routerInternalPort" . | quote }}
          - "--executorUrl"
          - "http://executor.{{ .Release.Namespace }}"
        env:
        {{- if .Values.authentication.enabled }}
        - name: AUTH_USERNAME
          valueFrom:
            secretKeyRef:
              name: router
              key: username
        - name: AUTH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: router
              key: password
        - name: JWT_SIGNING_KEY
          valueFrom:
            secretKeyRef:
              name: router
              key: jwtSigningKey
        {{- end }}      
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: ROUTER_ROUND_TRIP_TIMEOUT
          value: {{ .Values.router.roundTrip.timeout | default "50ms" | quote }}
        - name: ROUTER_ROUNDTRIP_TIMEOUT_EXPONENT
          value: {{ .Values.router.roundTrip.timeoutExponent | default 2 | quote }}
        - name: ROUTER_ROUND_TRIP_KEEP_ALIVE_TIME
          value: {{ .Values.router.roundTrip.keepAliveTime | default "30s" | quote }}
        # NOTE: not `| default true`: sprig's default treats false as empty, so
        # an explicit `disableKeepAlive: false` would silently coerce back to
        # "true" and make keep-alive impossible to enable (the values.yaml
        # default is false; nil also renders "false").
        - name: ROUTER_ROUND_TRIP_DISABLE_KEEP_ALIVE
          value: {{ if .Values.router.roundTrip.disableKeepAlive }}"true"{{ else }}"false"{{ end }}
        - name: ROUTER_ROUND_TRIP_MAX_IDLE_CONNS_PER_HOST
          value: {{ .Values.router.roundTrip.maxIdleConnsPerHost | default 256 | quote }}
        - name: ROUTER_ROUND_TRIP_MAX_RETRIES
          value: {{ .Values.router.roundTrip.maxRetries | default 10 | quote }}
        - name: ROUTER_SVC_ADDRESS_MAX_RETRIES
          value: {{ .Values.router.svcAddressMaxRetries | default 5 | quote }}
        - name: ROUTER_SVC_ADDRESS_UPDATE_TIMEOUT
          value: {{ .Values.router.svcAddressUpdateTimeout | default "30s" | quote }}
        - name: ROUTER_UNTAP_SERVICE_TIMEOUT
          value: {{ .Values.router.unTapServiceTimeout | default "3600s" | quote }}
        {{- if kindIs "bool" .Values.router.endpointSliceCache.mode }}
        {{- fail "router.endpointSliceCache.mode must be a quoted string (\"on\"/\"off\") — unquoted on/off are YAML 1.1 booleans, and an unquoted off would silently default back to \"on\"" }}
        {{- end }}
        {{- $epsMode := .Values.router.endpointSliceCache.mode | default "on" }}
        {{- if not (has $epsMode (list "off" "on")) }}
        {{- fail (printf "router.endpointSliceCache.mode must be one of off|on (shadow was removed with the RFC-0002 phase-4 defaults flip), got %q" $epsMode) }}
        {{- end }}
        - name: ROUTER_ENDPOINTSLICE_CACHE_MODE
          value: {{ $epsMode | quote }}
        - name: ROUTER_ENDPOINTSLICE_ENDPOINT_LB
          value: {{ .Values.router.endpointSliceCache.endpointLB | default false | quote }}
        - name: USE_ENCODED_PATH
          value: {{ .Values.router.useEncodedPath | default false | quote }}
        - name: DEBUG_ENV
          value: {{ .Values.debugEnv | quote }}
        - name: PPROF_ENABLED
          value: {{ .Values.pprof.enabled | quote }}
        - name: DISPLAY_ACCESS_LOG
          value: {{ .Values.router.displayAccessLog | default false | quote }}
        - name: GATEWAY_API_ENABLED
          value: {{ .Values.gatewayAPI.enabled | default false | quote }}
        {{- if .Values.gatewayAPI.defaultParentRef }}
        - name: GATEWAY_DEFAULT_PARENTREF
          value: {{ .Values.gatewayAPI.defaultParentRef | quote }}
        {{- end }}
        {{- if .Values.asyncInvocation.enabled }}
        # RFC-0024 async invocation: the enqueue branch + the in-router dispatcher.
        # The statestore driver follows the statestore mode — the embedded HTTP
        # service (client) or external Postgres directly. ROUTER_INTERNAL_URL is the
        # dispatcher's delivery target (svc/router-internal, possibly another replica).
        - name: ASYNC_INVOCATION_ENABLED
          value: "true"
        {{- if eq .Values.statestore.mode "embedded" }}
        - name: STATESTORE_DRIVER
          value: "client"
        - name: STATESTORE_DSN
          value: "http://statestore.{{ .Release.Namespace }}:{{ include "fission.statestorePort" . }}"
        {{- else if eq .Values.statestore.mode "external" }}
        - name: STATESTORE_DRIVER
          value: "postgres"
        - name: STATESTORE_DSN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.statestore.external.existingSecret | default "statestore-postgres" }}
              key: dsn
        {{- end }}
        - name: ROUTER_INTERNAL_URL
          value: {{ include "fission.routerInternalURL" . | quote }}
        # RFC-0027 broker egress: the router enqueues broker-destined topic
        # publishes ONLY for types whose classic head is deployed to drain the
        # queue — a job on a consumer-less queue never dead-letters and is
        # invisible to every DLQ surface. Extend the list as broker heads gain
        # egress loops.
        {{- if .Values.kafka.enabled }}
        - name: EVENTING_EGRESS_TYPES
          value: "kafka"
        {{- end }}
        {{- end }}
        {{- include "fission-resource-namespace.envs" . | indent 8 }}
        {{- include "kube_client.envs" . | indent 8 }}
        {{- include "opentelemtry.envs" . | indent 8 }}
        {{- include "internalAuth.envs" . | indent 8 }}
        {{- include "coverage.envs" . | indent 8 }}
        resources:
          {{- toYaml .Values.router.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: "/readyz"
            port: {{ include "fission.routerPort" . }}
          initialDelaySeconds: 1
          periodSeconds: 1
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: "/router-healthz"
            port: {{ include "fission.routerPort" . }}
          initialDelaySeconds: 35
          periodSeconds: 5
        volumeMounts:
        - name: config-volume
          mountPath: /etc/config/config.yaml
          subPath: config.yaml
        {{- include "coverage.volumemount" . | indent 8 }}
        ports:
        - containerPort: 8080
          name: metrics
        - containerPort: {{ include "fission.routerPort" . }}
          name: http
        - containerPort: {{ include "fission.routerInternalPort" . }}
          name: internal
        {{- if .Values.pprof.enabled }}
        - containerPort: 6060
          name: pprof
        {{- end }}
        {{- if .Values.router.terminationMessagePath }}
        terminationMessagePath: {{ .Values.router.terminationMessagePath }}
        {{- else if .Values.terminationMessagePath }}
        terminationMessagePath: {{ .Values.terminationMessagePath }}
        {{- end }}
        {{- if .Values.router.terminationMessagePolicy }}
        terminationMessagePolicy: {{ .Values.router.terminationMessagePolicy }}
        {{- else if .Values.terminationMessagePolicy }}
        terminationMessagePolicy: {{ .Values.terminationMessagePolicy }}
        {{- end }}
      serviceAccountName: fission-router
      {{- with .Values.router.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      volumes:
      - name: config-volume
        configMap:
          name: feature-config
      {{- include "coverage.volume" . | indent 6 }}
{{- if .Values.router.priorityClassName }}
      priorityClassName: {{ .Values.router.priorityClassName }}
{{- else if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
{{- end }}
    {{- with .Values.imagePullSecrets }}
      imagePullSecrets: 
        {{- toYaml . | nindent 8 }}
    {{- end }}
{{- if .Values.router.extraCoreComponentPodConfig }}
{{ toYaml .Values.router.extraCoreComponentPodConfig | indent 6 -}}
{{- else }}
{{- if .Values.extraCoreComponentPodConfig }}
{{ toYaml .Values.extraCoreComponentPodConfig | indent 6 -}}
{{- end }}
{{- end }}

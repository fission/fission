{{- if .Values.networkPolicy.enabled }}
# Restrict ingress to the router. Router is the single user-facing entry
# point for HTTP-triggered functions, so port 8888 stays open from any
# source (LoadBalancer / Ingress controller / NodePort traffic must
# continue to work). The internal-caller rule below is documentation:
# kubewatcher / timer / mqtrigger / canaryconfig publish events to router
# via WebhookPublisher (see pkg/publisher/webhookPublisher.go).
#
# Operators who terminate user traffic at a known ingress namespace can
# tighten the first ingress rule by replacing the bare port-only entry
# with a `from` block selecting their ingress controller pods.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: router-allow-ingress
  namespace: {{ .Release.Namespace | quote }}
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    svc: router
    application: fission-router
spec:
  podSelector:
    matchLabels:
      svc: router
      application: fission-router
  policyTypes:
    - Ingress
  ingress:
    # User-facing HTTP triggers. No `from` selector means any source
    # (cluster-internal pods, LoadBalancer, NodePort) — router is
    # designed to be reachable from outside the cluster.
    - ports:
        - port: {{ include "fission.routerPort" . }}
          protocol: TCP
    # Internal Fission components that publish events to the router.
    # Listed explicitly for documentation even though the open rule
    # above already covers them. `podSelector` without
    # `namespaceSelector` matches pods only in this NetworkPolicy's
    # own namespace (the chart release namespace), which is the scope
    # we want — and is portable across k8s versions/configs that may
    # not auto-populate the `kubernetes.io/metadata.name` namespace
    # label.
    - from:
        - podSelector:
            matchLabels:
              svc: kubewatcher
        - podSelector:
            matchLabels:
              svc: timer
        - podSelector:
            matchLabels:
              svc: mqtrigger
        - podSelector:
            matchLabels:
              svc: mqtrigger-keda
        - podSelector:
            matchLabels:
              svc: canaryconfig
      ports:
        - port: {{ include "fission.routerPort" . }}
          protocol: TCP
    # Internal listener (port {{ .Values.router.internalPort | default 8889 }}) — serves
    # /fission-function/<ns>/<name>. After GHSA-3g33-6vg6-27m8 these
    # routes are NOT registered on the public listener, so all
    # in-cluster trigger callers must reach the router on this port.
    # The HMAC verifier wraps the listener; this NetworkPolicy is the
    # second layer of defence (zero-trust transport, per RFC-0004) that
    # keeps unsigned attackers out of port {{ .Values.router.internalPort | default 8889 }} entirely.
    - from:
        - podSelector:
            matchLabels:
              svc: kubewatcher
        - podSelector:
            matchLabels:
              svc: timer
        - podSelector:
            matchLabels:
              svc: mqtrigger
        - podSelector:
            matchLabels:
              svc: mqtrigger-keda
        - podSelector:
            matchLabels:
              svc: canaryconfig
        - podSelector:
            matchLabels:
              svc: executor
        - podSelector:
            matchLabels:
              svc: buildermgr
        # The MCP tool server proxies tools/call to /fission-function/...
        # on the internal listener (HMAC-signed, like the publishers above).
        - podSelector:
            matchLabels:
              svc: mcp
      ports:
        - port: {{ include "fission.routerInternalPort" . }}
          protocol: TCP
    # Metrics endpoint open to any scraper.
    - ports:
        - port: 8080
          protocol: TCP
{{- end }}

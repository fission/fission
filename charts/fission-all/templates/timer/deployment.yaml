apiVersion: apps/v1
kind: Deployment
metadata:
  name: timer
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    svc: timer
spec:
  replicas: {{ dig "replicas" 1 (.Values.timer | default dict) }}
  selector:
    matchLabels:
      svc: timer
  template:
    metadata:
      labels:
        svc: timer
    spec:
      {{- if .Values.timer.securityContext.enabled }}
      securityContext: {{- omit .Values.timer.securityContext "enabled" | toYaml | nindent 8 }}
      {{- end }}
      containers:
      - name: timer
        image: {{ include "fission-bundleImage" . | quote }}
        imagePullPolicy: {{ .Values.pullPolicy }}
        command: ["/fission-bundle"]
        args: ["--timer", "--routerUrl", "http://router.{{ .Release.Namespace }}"]
        env:
        {{- include "fission.podNamespaceEnv" . | nindent 8 }}
        {{- include "leaderElection.envs" (dict "enabled" (dig "leaderElection" "enabled" false (.Values.timer | default dict))) | indent 8 }}
        - name: DEBUG_ENV
          value: {{ .Values.debugEnv | quote }}
        - name: PPROF_ENABLED
          value: {{ .Values.pprof.enabled | quote }}
        # /fission-function/<ns>/<name> lives only on the router's
        # internal listener (GHSA-3g33-6vg6-27m8). Publishing there
        # requires HMAC signing; the env mounted by internalAuth.envs
        # supplies the secret.
        - name: ROUTER_INTERNAL_URL
          value: {{ include "fission.routerInternalURL" . | quote }}
        {{- include "fission-resource-namespace.envs" . | indent 8 }}
        {{- include "kube_client.envs" . | indent 8 }}
        {{- include "opentelemtry.envs" . | indent 8 }}
        {{- include "internalAuth.envs" . | indent 8 }}
        {{- include "coverage.envs" . | indent 8 }}
        resources:
          {{- toYaml .Values.timer.resources | nindent 10 }}
        {{- if .Values.terminationMessagePath }}
        terminationMessagePath: {{ .Values.terminationMessagePath }}
        {{- end }}
        {{- if .Values.terminationMessagePolicy }}
        terminationMessagePolicy: {{ .Values.terminationMessagePolicy }}
        {{- end }}
        {{- if .Values.coverage.enabled }}
        volumeMounts:
        {{- include "coverage.volumemount" . | indent 8 }}
        {{- end }}
      serviceAccountName: fission-timer
      {{- if .Values.coverage.enabled }}
      volumes:
      {{- include "coverage.volume" . | indent 6 }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
    {{- with .Values.imagePullSecrets }}
      imagePullSecrets: 
        {{- toYaml . | nindent 8 }}
    {{- end }}
{{- if .Values.extraCoreComponentPodConfig }}
{{ toYaml .Values.extraCoreComponentPodConfig | indent 6 -}}
{{- end }}
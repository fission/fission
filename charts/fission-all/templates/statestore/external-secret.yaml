{{- if and .Values.statestore.enabled (eq .Values.statestore.mode "external") .Values.statestore.external.dsn }}
# External mode: Fission does NOT deploy a database. The chart only wires the
# user-managed Postgres DSN into a Secret that consumers mount. If you manage the
# Secret yourself, set statestore.external.existingSecret and leave dsn empty.
apiVersion: v1
kind: Secret
metadata:
  name: statestore-postgres
  labels:
    application: fission-statestore
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
type: Opaque
stringData:
  dsn: {{ .Values.statestore.external.dsn | quote }}
{{- end }}

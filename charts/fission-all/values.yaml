pprof:
  enabled: false

## coverage instruments fission-bundle pods to emit Go binary coverage
## (GOCOVERDIR) for integration tests. DEV/CI ONLY — never enable in
## production: it mounts a node hostPath. Default off; turned on by the
## kind-ci skaffold profile. Requires images built with `GOFLAGS=-cover`.
##
## Wired into the fission-bundle control-plane Deployments that run as the
## standard uid 10001: router, executor, buildermgr, kubewatcher, timer,
## mqtrigger (kafka/keda), storagesvc, canary-config and webhook.
##
coverage:
  enabled: false
  ## hostPath on the node where coverage files are written. Must be
  ## pre-created and chown'd to the pod uid by CI before deploy.
  hostPath: /fission-coverage
  ## in-container path exported as GOCOVERDIR.
  mountPath: /coverage

## Enable runtimePodSpec and add spec to your poolmgr or newdeploy pods
##
runtimePodSpec:

  ## Setting it false by default so that integration tests pass
  ##
  enabled: false

  ## Checkout PodSpec in https://fission.io/docs/reference/crd-reference/#runtime
  ##
  podSpec:

    ## Default podspec to improve security of the pods
    ##
    securityContext:
      fsGroup: 10001
      runAsGroup: 10001
      runAsNonRoot: true
      runAsUser: 10001

## Enable builderPodSpec and add spec to your env builder pods
##
builderPodSpec:

  ## Setting it false by default so that integration tests pass
  ##
  enabled: false

  ## Checkout PodSpec in https://fission.io/docs/reference/crd-reference/#builder
  ##
  podSpec:

    ## Default podspec to improve security of the pods
    ##
    securityContext:
      fsGroup: 10001
      runAsGroup: 10001
      runAsNonRoot: true
      runAsUser: 10001


## Enable Grafana Dashboard configmaps for auto dashboard provisioning
## If you use kube-prometheus stack for monitoring, these will get imported into grafana
grafana:
  ## The namespace in which grafana pod is present
  namespace: monitoring
  dashboards:
    ## Disabled by default. switch to true to deploy them
    enable: false


## NetworkPolicy: ingress isolation for every Fission component that
## exposes a non-metrics listener. When enabled, the chart renders one
## ingress-only NetworkPolicy per service:
##   - storagesvc           (port 8000)  ← buildermgr, fetcher sidecars
##   - router               (port 8888)  ← external + internal publishers
##   - executor             (port 8888)  ← router only
##   - webhook-server       (port 9443)  ← kube-apiserver (admission)
##   - env-builder pods     (8000/8001)  ← buildermgr only
##   - function pods        (8000/8888)  ← executor + router
## All metrics endpoints (port 8080) remain reachable from any source so
## Prometheus / podMonitor scrapes work regardless of namespace.
##
## Defense-in-depth control for in-cluster plain-HTTP traffic, which has
## no application-layer authentication today. Off by default for
## backwards compatibility — recommend enabling in production deployments
## that don't already restrict pod-to-pod traffic.
##
## Requires a NetworkPolicy-aware CNI (Calico, Cilium, Weave, etc.).
## Egress rules are intentionally not added in this round.
networkPolicy:
  enabled: false


## InternalAuth: HMAC-SHA256 application-layer authentication for the
## internal control-plane HTTP services. See the design at docs/internal-auth/00-design.md for the full design.
## When enabled, the chart materialises Secret/fission-internal-auth and
## mounts FISSION_INTERNAL_AUTH_SECRET into storagesvc, buildermgr,
## executor and router. Storagesvc rejects unsigned /v1/archive requests;
## the storagesvc-client transparently signs every outgoing request.
##
## The secret value is preserved across `helm upgrade` via Helm's
## `lookup` — once a value is generated, subsequent upgrades reuse it.
## Override `secret` to bring your own value; set `oldSecret` to the
## previous value during a rotation window so the verifier accepts both.
##
## Disabled here means the cluster falls back to NetworkPolicy + namespace
## isolation only, matching pre-1.(N+1) behaviour.
internalAuth:
  enabled: true
  # secret: "" — auto-generated on first install; preserved on upgrade.
  # oldSecret: "" — set during rotation; accepted by the verifier alongside `secret`.


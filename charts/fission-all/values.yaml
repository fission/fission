## Fission chart configuration
##

## serviceType to consider while creating Fission webhook service.
## For minikube/kind, set this to NodePort, elsewhere use LoadBalancer or ClusterIP.
##
serviceType: ClusterIP

## routerServiceType to consider while creating Fission Router service.
## For minikube, set this to NodePort, elsewhere use LoadBalancer or ClusterIP.
##
routerServiceType: LoadBalancer

## repository represents base repository for images used in the chart.
## Keep it empty for using existing local image
##
repository: ghcr.io

## image represents the base image fission-bundle used by multiple Fission components.
## We alter arguments to the image to run a particular component.
##
image: fission/fission-bundle

## imageTag represents the tag of the base image fission-bundle used by multiple Fission components.
## It is also used by the chart to identify version of the few more images apart from fission-bundle.
## Keep it empty for using latest tag.
##
imageTag: v1.27.0

## pullPolicy represents the pull policy to use for images in the chart.
##
pullPolicy: IfNotPresent

## imagepullsecrets
imagePullSecrets: []

## priorityClassName represents the priority class name to use for Fission components.
## Refer to https://kubernetes.io/docs/concepts/scheduling-eviction/pod-priority-preemption/
## executor.priorityClassName takes precedence over this value for executor.
## router.priorityClassName takes precedence over this value for router.
##
priorityClassName: ""

## terminationMessagePath is the path at which the pod termination message will be written.
## executor.terminationMessagePath takes precedence over this value for executor.
## router.terminationMessagePath takes precedence over this value for router.
##
terminationMessagePath: /dev/termination-log

## terminationMessagePolicy is the policy for the termination message.
## executor.terminationMessagePolicy takes precedence over this value for executor.
## router.terminationMessagePolicy takes precedence over this value for router.
##
terminationMessagePolicy: File

## routerPort represents the port at which the Fission Router service should be exposed.
##
routerPort: 31314

## defaultNamespace represents the namespace in which Fission custom resources will be created by the Fission user.
## This is different from the release namespace.
## Please consider setting `additionalFissionNamespaces` if you want more than one namespace to be used for Fission custom resources.
##
defaultNamespace: default

## builderNamespace represents the namespace in which Fission Builder resources will be created.
## if builderNamespace is set to empty then builder resources will be created in the same namespace as the Fission resources.
## This is different from the release namespace.
##
## Note: This parameter is deprecated and will be removed in future fission releases.
##
builderNamespace: ""

## functionNamespace represents the namespace in which Fission Function resources will be created.
## if functionNamespace is set to empty then function resources will be created in the same namespace as the Fission resources.
## This is different from the release namespace.
##
## Note: This parameter is deprecated and will be removed in future fission releases.
##
functionNamespace: ""

## Fission will watch the following namespaces along with the `defaultNamespace` for fission custom resources.
## additionalFissionNamespaces:
## - namespace1
## - namespace2
## - namespace3
additionalFissionNamespaces: []

## createNamespace decides to create namespaces by the chart.
## If set to true, functionNamespace and builderNamespace namespaces mentioned above will be created by the chart.
## Set to false if you want to create the namespaces manually.
##
createNamespace: true

## disableOwnerReference decides to set OwnerReference to K8s resources like deployment, services, hpa etc. created by Fission.
## If set to true, the K8s resources created by Fission will not have OwnerReference set.
## Set to false if you want to add OwnerReference to K8s resources created by Fission.
##
## Set to true if you are using cross namespace meaning `builderNamespace` and `functionNamespace` are set.
##
## Note: This flag is temporary addition and would be removed in future fission releases.
##
disableOwnerReference: false

## finalizerEnabled is a chart-wide toggle for finalizer-based cleanup of the
## Kubernetes resources Fission controllers create. When enabled (default), a
## controller adds a cleanup finalizer to the CRs it owns and tears their backing
## resources down on delete before releasing it — the reliable mechanism for
## cross-namespace cleanup, which owner-reference GC cannot do (see
## builderNamespace / functionNamespace). Currently honoured by the executor
## (Function); other Fission controllers will adopt the same flag over time.
##
## Disable (set false) only if you need deletes to never block on a controller
## being available; cleanup then falls back to best-effort reaping. A finalizer
## left behind because its controller is down can be cleared manually with:
##   kubectl patch <resource> <name> -n <ns> --type=merge -p '{"metadata":{"finalizers":[]}}'
##
finalizerEnabled: true

## enableIstio indicates whether to enable istio integration.
##
enableIstio: false

## gatewayAPI configures the router's Gateway API route provider. When enabled,
## the router creates a gateway.networking.k8s.io HTTPRoute for each HTTPTrigger
## whose routeConfig.provider is "gateway", attaching it to an operator-managed
## Gateway (Fission does not create Gateways or GatewayClasses). Enabling it also
## grants the router RBAC for httproutes/referencegrants. Requires the Gateway
## API CRDs and a Gateway controller (e.g. Envoy Gateway) installed in the cluster.
gatewayAPI:
  enabled: false
  ## defaultParentRef is an optional default Gateway that HTTPRoutes attach to
  ## when a trigger does not list its own routeConfig.gateway.parentRefs.
  ## Format: "name" or "namespace/name".
  defaultParentRef: ""

## Kubernetes client QPS and Burst settings
##
## kubernetesClientQPS represents the maximum queries per second to the kubernetes api server from client instances of fission components.
kubernetesClientQPS: 200
## kubernetesClientBurst represents the maximum burst queries to the kubernetes api server from client instances of fission components.
kubernetesClientBurst: 500

## packageRegistry publishes built function packages to a container registry
## as OCI images instead of storing tarballs. Functions then cold-start
## faster on Kubernetes 1.33+ (code is mounted directly by the kubelet).
## Without a registry, builds keep using internal storage — no change.
## NOTE: the registry must be reachable from inside the cluster AND from
## every node.
##
packageRegistry:
  enabled: false
  ## Repository root. Packages are pushed to
  ## <repositoryPrefix>/<namespace>/<package>, e.g. ghcr.io/myorg/fission-packages.
  repositoryPrefix: ""
  ## Secret names (kubernetes.io/dockerconfigjson, in the builder namespace):
  ## pushSecret needs write access (used at build time); pullSecret needs
  ## read access (attached to packages for pulling). Keep them separate.
  pushSecret: ""
  pullSecret: ""
  ## On a failed push: true keeps the build and stores a tarball instead
  ## (the package gets condition OCIPublished=False); false fails the build.
  fallbackToStorage: true
  ## --- Advanced (mainly for self-hosted / in-cluster registries) ---
  ## publishedPrefix: if nodes reach the registry by a DIFFERENT address
  ## than pods do (e.g. an in-cluster registry exposed via NodePort), set
  ## the node-visible prefix here; it is recorded in packages while pushes
  ## go to repositoryPrefix.
  publishedPrefix: ""
  ## insecureHosts: comma-separated host[:port] list allowed to use plain
  ## HTTP instead of TLS.
  insecureHosts: ""

## fetcher is a light weight component that helps in running functions.
## fetcher helps in fetching function source code/build and uploading it when function is invoked.
##
fetcher:
  ## repository represents the repository of the fetcher component.
  ##
  ## By default, it is empty, which means global repository will be used.
  repository: ""
  ## image represents the image of the fetcher component.
  image: fission/fetcher
  ## imageTag represents the tag of the image of the fetcher component.
  imageTag: v1.27.0
  ## allowInsecureRegistries is a comma-separated list of registry hosts
  ## (host[:port]) permitted to serve OCI package images over plain HTTP.
  ## Default empty: registries must serve TLS (localhost and private RFC-1918
  ## IP addresses are implicitly trusted by the underlying client).
  allowInsecureRegistries: ""

  ## Fetcher is only for to downloading or uploading archive.
  ## Normally, you don't need to change the value here, unless necessary.
  ##
  resource:
    ## cpu represents the cpu resource required by the fetcher component.
    ##
    cpu:
      requests: "10m"
      ## Low CPU limits will increases the function specialization time.
      limits: ""
    ## mem represents the memory resource required by the fetcher component.
    ##
    mem:
      requests: "16Mi"
      limits: ""

## executor is responsible for providing resources to your functions.
##
executor:
  ## replicas decides how many executor pods to deploy. Defaults to 1.
  ## To run more than one safely you MUST enable leaderElection below: the
  ## executor is active-passive, so only the elected leader performs the
  ## mutating controller/reaper work; the standbys keep warm caches and take
  ## over on failure (faster failover + zero-downtime rolling upgrades).
  ##
  replicas: 1
  ## leaderElection enables Lease-based leader election for the executor.
  ## Leave disabled (default) for single-replica installs — behaviour is then
  ## identical to before. Set enabled: true together with replicas > 1 for HA.
  ##
  leaderElection:
    enabled: false
  ## strategy is the Deployment rollout strategy for the executor. Leave unset
  ## for the Kubernetes default. With leaderElection enabled, a surge strategy
  ## keeps a standby warm across upgrades, e.g.:
  ##   strategy:
  ##     type: RollingUpdate
  ##     rollingUpdate:
  ##       maxSurge: 1
  ##       maxUnavailable: 0
  ##
  strategy: {}
  ## terminationGracePeriodSeconds gives in-flight work time to drain on
  ## shutdown. Leave unset for the Kubernetes default (30s). Keep it at or
  ## above GRACEFUL_SHUTDOWN_TIMEOUT.
  ##
  terminationGracePeriodSeconds: null
  ## podDisruptionBudget (opt-in) protects executor availability during
  ## voluntary disruptions (node drains). Only meaningful with replicas > 1.
  ##
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
    # maxUnavailable:
  ## executor priorityClassName
  ## Ref. https://kubernetes.io/docs/concepts/scheduling-eviction/pod-priority-preemption/
  ## Recommended to use system-cluster-critical for executor pods.
  ##
  priorityClassName: ""
  ## terminationMessagePath is the path at which the file to which the executor will write a message upon termination.
  ##
  terminationMessagePath: ""
  ## terminationMessagePolicy is the policy for the executor termination message.
  ##
  terminationMessagePolicy: ""
  ## adoptExistingResources decides whether to adopt existing resources when executor restarts or Fission is redeployed.
  ##
  adoptExistingResources: false
  ## Mount OCI packages directly into function pods (needs Kubernetes 1.33+;
  ## older clusters automatically fall back to downloading the package).
  ## Gives noticeably faster cold starts. Set false to always download.
  ##
  enableOCIImageVolume: true
  ## How long an unused per-package warm pool is kept before removal; it is
  ## recreated automatically on the next request. Shared environment pools
  ## are never removed.
  ##
  ociPoolIdleReapTime: 5m
  ## functionServices opts the pool manager into creating a headless selector
  ## Service per invoked function (RFC-0002 EndpointSlice-native data plane),
  ## so the built-in EndpointSlice controller publishes the function's
  ## specialized pods for the router's slice-fed endpoint index.
  ## On by default since RFC-0002 phase 4; set false to fall back to the
  ## legacy executor-RPC-only data plane. Inert without the router-side
  ## endpointSliceCache mode.
  ##
  functionServices:
    enabled: true
  ## specializationConcurrency bounds concurrently running specializations in
  ## the executor (EXECUTOR_SPECIALIZATION_CONCURRENCY). 0 keeps the
  ## historical unbounded behavior — and is the recommended setting: the bound
  ## is shared by fast poolmgr specializations (~100ms) and newdeploy/container
  ## creations that hold a slot while waiting minutes for Deployment readiness,
  ## so a small bound under mixed load head-of-line blocks poolmgr cold starts.
  ## Only set this if poolmgr-heavy specialization bursts are overwhelming your
  ## nodes, and size it generously.
  ##
  specializationConcurrency: 0
  ## maxPendingSpecializations bounds specializations IN FLIGHT per function on
  ## the router's ensureCapacity path (EXECUTOR_MAX_PENDING_SPECIALIZATIONS_PER_FUNCTION).
  ## Unlike the function Concurrency cap (a total-pods budget, default 500), this
  ## stops a saturated function from provisioning dozens of pods before any
  ## becomes ready; excess requests get a fast 429. 0 disables. Unset uses the
  ## executor default (20).
  ##
  # maxPendingSpecializations: 20
  ## podReadyTimeout represents the timeout in seconds for waiting for pod to become ready.
  ## This is applicable to Pool Manager executor type only.
  ##
  podReadyTimeout: 300s

  ## Pod resources as:
  ##  resources:
  ##    limits:
  ##      cpu: <tbd>
  ##      memory: <tbd>
  ##    requests:
  ##      cpu: <tbd>
  ##      memory: <tbd>
  ##
  resources: {}

  ## Security Context
  ## It holds pod-level and container level security configuration.
  ## This is an experimental section, please verify before enabling in production.
  ## Ref: https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#security-context-1
  securityContext:
    enabled: true
    ## Mark it false, if you want to stop the non root user validation
    runAsNonRoot: true
    fsGroup: 10001
    runAsUser: 10001
    runAsGroup: 10001

  ## Object Reaper
  ## objectReaperInterval (seconds) represents GLOBAL interval to run process that reaps objects after certain idle time.
  ## Also you can set different objectReaperInterval for specific executor type. See poolmgs/newdeploy/container section
  ## Default: 5 (in seconds)
  ##
  objectReaperInterval: 5

  poolmgr: {}
    ## objectReaperInterval specific to poolmgr executor type
    ##
    ## objectReaperInterval: 5
  newdeploy: {}
    ## objectReaperInterval specific to newdeploy  executor type
    ##
    ## objectReaperInterval: 5
  container: {}
    ## objectReaperInterval specific to container executor type
    ##
    ## objectReaperInterval: 5

  serviceAccountCheck:
    ## enables fission to create service account, roles and rolebinding for missing permission for builder and fetcher.
    enabled: true
    ## indicates the time interval in minutes, after that fission will create service account, roles and rolebinding for builder and fetcher.
    ## interval will be applicable only if enable value is set to true.
    ## default timing will be 0 minutes. That means check will run only once.
    ## if you want to run check every 30 minutes then set interval to 30.
    interval: 0
## router is responsible for routing function calls to the appropriate function.
##
router:
  ## internalPort is the port that backs the router's internal listener.
  ## /fission-function/<ns>/<name> is registered ONLY on this listener
  ## (see GHSA-3g33-6vg6-27m8). The Service exposes it as a named port
  ## "internal" and a NetworkPolicy gates it to fission-bundle pods
  ## (executor / kubewatcher / timer / mqtrigger / mqtrigger-keda /
  ## canaryconfig / buildermgr) only.
  ##
  ## port is the router's public listener port (fronted by the Service's
  ## port 80). Mirrored by pkg/svcinfo.PortRouter.
  port: 8888
  internalPort: 8889
  ## strategy is the Deployment rollout strategy for the router (ignored when
  ## deployAsDaemonSet is true). Leave unset for the Kubernetes default. The
  ## router is stateless, so a surge strategy gives zero-downtime rollouts:
  ##   strategy:
  ##     type: RollingUpdate
  ##     rollingUpdate:
  ##       maxSurge: 1
  ##       maxUnavailable: 0
  ##
  strategy: {}
  ## terminationGracePeriodSeconds gives in-flight requests time to drain on
  ## shutdown. Leave unset for the Kubernetes default (30s). Keep it at or
  ## above GRACEFUL_SHUTDOWN_TIMEOUT.
  ##
  terminationGracePeriodSeconds: null
  ## podDisruptionBudget (opt-in) protects router availability during voluntary
  ## disruptions. Only meaningful with replicas > 1 (not a DaemonSet).
  ##
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
    # maxUnavailable:
  ## autoscaling (opt-in) deploys a HorizontalPodAutoscaler for the router. The
  ## router is stateless and replica-independent, so it scales out cleanly.
  ## Ignored when deployAsDaemonSet is true.
  ##
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
  ## keda (opt-in) scales the router on the RFC-0024 async-invocation backlog via a
  ## KEDA ScaledObject using the postgresql scaler on the statestore queue depth.
  ## Requires KEDA installed, asyncInvocation.enabled, and statestore.mode=external
  ## (the postgresql scaler cannot reach an embedded SQLite store). It is mutually
  ## exclusive with router.autoscaling (KEDA manages its own HPA on the router).
  ## The Prometheus-scaler variant (mode-agnostic, needs an external Prometheus +
  ## the router ServiceMonitor) is a documented follow-up.
  ##
  keda:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    ## Desired visible async backlog per router replica; replicas scale toward
    ## ceil(backlog / targetBacklogPerReplica).
    targetBacklogPerReplica: 50
    pollingInterval: 15
    cooldownPeriod: 120
  ## router priorityClassName
  ## Ref. https://kubernetes.io/docs/concepts/scheduling-eviction/pod-priority-preemption/
  ## Recommended to use system-cluster-critical for router pods.
  ##
  priorityClassName: ""
  ## terminationMessagePath is the path at which the file to which the router will write a message upon termination.
  ##
  terminationMessagePath: ""
  ## terminationMessagePolicy is the policy for the router termination message.
  ##
  terminationMessagePolicy: ""
  ## deployAsDaemonSet decides whether to deploy router as a DaemonSet or a Deployment.
  ##
  deployAsDaemonSet: false
  ## replicas decides how many router pods to deploy. Only used when deployAsDaemonSet is false.
  ##
  replicas: 1
  ## svcAddressMaxRetries is the max times for router to retry with a specific function service address
  ##
  svcAddressMaxRetries: 5
  ## svcAddressUpdateTimeout is the timeout setting for a goroutine to wait for the update of a service entry.
  ##
  svcAddressUpdateTimeout: 30s
  ## unTapServiceTimeout is the timeout used in the request context of unTapService.
  ## unTapService is called to free up the resources once the function invocation is done.
  ##
  unTapServiceTimeout: 3600s
  ## endpointSliceCache gates the router's EndpointSlice-fed endpoint index
  ## (RFC-0002 EndpointSlice-native data plane).
  ## mode: on  — the index serves the warm path; the executor is called only
  ##             for cold starts, capacity, and strict-mode functions. The
  ##             default since RFC-0002 phase 4.
  ##       off — never watch slices (the legacy executor-RPC data plane).
  ## ALWAYS QUOTE the value ("on"/"off"): unquoted on/off are YAML 1.1
  ## booleans, and an unquoted off coerces to false, which the template
  ## treats as unset and silently DEFAULTS BACK TO "on" — the opposite of
  ## the intent.
  ## The migration-era "shadow" mode was removed with the defaults flip.
  ## The poolmgr benefit additionally requires executor.functionServices.enabled.
  ## endpointLB additionally dials newdeploy/container pod IPs directly
  ## (least-outstanding across ready endpoints) instead of the Service VIP;
  ## off by default.
  ##
  endpointSliceCache:
    mode: "on"
    endpointLB: false
  ## displayAccessLog display endpoing access logs
  ## Please be aware of enabling logging endpoint access log, it increases
  ## router resource utilization when under heavy workloads.
  ##
  displayAccessLog: false
  ## svcLabels is a map of custom labels to add to the router Service metadata.
  ## Note: avoid overriding reserved keys: svc, application, chart.
  ##
  # svcLabels:
  #   example.com/custom-label: "true"
  ## svcAnnotations is the annotations to be added to the service resource created for router.
  ##
  # svcAnnotations:
  #   cloud.google.com/load-balancer-type: Internal

  ## useEncodedPath decideds to match encoded path.
  ## If true, "/foo%2Fbar" will match the path "/{var}";
  ## Otherwise, it will match the path "/foo/bar".
  ## For details, see: https://github.com/fission/fission/issues/1317
  ##
  useEncodedPath: false

  roundTrip:
    ## If true, router will disable the HTTP keep-alive which result in performance degradation.
    ## But it ensures that router can redirect new coming requests to new function pods.
    ##
    ## If false, router will enable transport keep-alive feature for better performance.
    ## However, the drawback is it takes longer to switch to newly created function pods
    ## if using newdeploy as executor type for function. If you want to preserve the
    ## performance while keeping the short switching time to new function, you can create
    ## an environment with short grace period by setting flag "--graceperiod" (default 360s),
    ## so that kubernetes will be able to reap old function pod quickly.
    ##
    ## For details, see https://github.com/fission/fission/issues/723
    ## Since RFC-0014 the router pools connections to function pods; this is
    ## the escape hatch back to a fresh connection per request.
    ##
    disableKeepAlive: false

    ## maxIdleConnsPerHost bounds the router's pooled idle connections per
    ## function address (each poolmgr pod is its own address). Sized above
    ## typical per-pod concurrency so keep-alive connections stay warm under
    ## load instead of being re-dialed (which throttles RPS).
    ##
    maxIdleConnsPerHost: 256

    ## keepAliveTime is period for an active network connection to function pod.
    ##
    keepAliveTime: 30s

    ## timeout is HTTP transport request timeout
    ##
    timeout: 50ms

    ## The length of request timeout will multiply with timeoutExponent after each retry
    ##
    timeoutExponent: 2

    ## maxRetries defines no of retries of a failed request
    ##
    maxRetries: 10

  ## Extend the container specs for the core fission pods.
  ## Can be used to add things like affinity/tolerations/nodeSelectors/etc.
  ## For example:
  ## extraCoreComponentPodConfig:
  ##   affinity:
  ##     nodeAffinity:
  ##       requiredDuringSchedulingIgnoredDuringExecution:
  ##         nodeSelectorTerms:
  ##           - matchExpressions:
  ##             - key: capability
  ##               operator: In
  ##               values:
  ##                 - app
  ##
  #extraCoreComponentPodConfig:
  #  affinity:
  #  tolerations:
  #  nodeSelector:

  ## Pod resources as:
  ##  resources:
  ##    limits:
  ##      cpu: <tbd>
  ##      memory: <tbd>
  ##    requests:
  ##      cpu: <tbd>
  ##      memory: <tbd>
  ##
  resources: {}

  ## Security Context
  ## It holds pod-level and container level security configuration.
  ## This is an experimental section, please verify before enabling in production.
  ## Ref: https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#security-context-1
  securityContext:
    enabled: true
    ## Mark it false, if you want to stop the non root user validation
    runAsNonRoot: true
    fsGroup: 10001
    runAsUser: 10001
    runAsGroup: 10001

## The builder manager watches the package & environments CRD changes and manages the builds of function source code.
##
buildermgr:
  ## replicas to deploy. To run more than one safely, enable leaderElection
  ## below — active-passive HA: only the elected leader runs the controller.
  ##
  replicas: 1
  ## leaderElection enables Lease-based leader election. Leave disabled
  ## (default) for single-replica installs; set true with replicas > 1 for HA.
  ##
  leaderElection:
    enabled: false
  ## Pod resources as:
  ##  resources:
  ##    limits:
  ##      cpu: <tbd>
  ##      memory: <tbd>
  ##    requests:
  ##      cpu: <tbd>
  ##      memory: <tbd>
  ##
  resources: {}

  ## Security Context
  ## It holds pod-level and container level security configuration.
  ## This is an experimental section, please verify before enabling in production.
  ## Ref: https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#security-context-1
  securityContext:
    enabled: true
    ## Mark it false, if you want to stop the non root user validation
    runAsNonRoot: true
    fsGroup: 10001
    runAsUser: 10001
    runAsGroup: 10001

## webhook is the component that validates API calls.
## It contains validation and mutation for functions, triggers, environments, Kubernetes event watches, etc.
##
webhook:
  ## Pod resources as:
  ##  resources:
  ##    limits:
  ##      cpu: <tbd>
  ##      memory: <tbd>
  ##    requests:
  ##      cpu: <tbd>
  ##      memory: <tbd>
  ##
  resources: {}

  certManager:
    enabled: false

  caBundlePEM: |

  crtPEM: |

  keyPEM: |


  ## Security Context
  ## It holds pod-level and container level security configuration.
  ## This is an experimental section, please verify before enabling in production.
  ## Ref: https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#security-context-1
  securityContext:
    enabled: true
    ## Mark it false, if you want to stop the non root user validation
    runAsNonRoot: true
    fsGroup: 10001
    runAsUser: 10001
    runAsGroup: 10001


## kubewatcher watches the Kubernetes API and invokes functions associated with watches, sending the watch event to the function.
##
kubewatcher:
  ## replicas to deploy. To run more than one safely, enable leaderElection
  ## below — active-passive HA: only the elected leader runs the controller.
  ##
  replicas: 1
  ## leaderElection enables Lease-based leader election. Leave disabled
  ## (default) for single-replica installs; set true with replicas > 1 for HA.
  ##
  leaderElection:
    enabled: false
  ## Pod resources as:
  ##  resources:
  ##    limits:
  ##      cpu: <tbd>
  ##      memory: <tbd>
  ##    requests:
  ##      cpu: <tbd>
  ##      memory: <tbd>
  ##
  resources: {}

  ## Security Context
  ## It holds pod-level and container level security configuration.
  ## This is an experimental section, please verify before enabling in production.
  ## Ref: https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#security-context-1
  securityContext:
    enabled: true
    ## Mark it false, if you want to stop the non root user validation
    runAsNonRoot: true
    fsGroup: 10001
    runAsUser: 10001
    runAsGroup: 10001

## The MCP (Model Context Protocol) server exposes opted-in functions as tools
## for LLM agents. Off by default. When enabled it runs fission-bundle --mcpPort
## as a ClusterIP-only Service and proxies tools/call to the router internal
## listener. Agents authenticate with a bearer JWT when authentication.enabled is
## set (the allowed_namespaces claim scopes which tools they may use). With
## authentication disabled the endpoint can only run unauthenticated (every
## caller gets a wildcard scope) if you explicitly set allowInsecure below;
## otherwise enabling MCP without authentication fails the chart render.
##
mcp:
  enabled: false
  ## Port the MCP server listens on (ClusterIP Service of the same port).
  ##
  port: 8890
  ## allowInsecure permits running the MCP endpoint UNAUTHENTICATED when
  ## authentication.enabled is false (dev/test only — every caller can list and
  ## invoke all Tool-exposed functions). Leave false in production; enable
  ## authentication instead so agents are scoped by a signed JWT.
  ##
  allowInsecure: false
  ## replicas to deploy. The server is stateless and runs without leader
  ## election — every replica reconciles and serves the full tool list. Contested
  ## explicit tool names (FunctionSpec.tool.toolName) are resolved deterministically
  ## (smallest namespace/name wins) so replicas converge identically; prefer the
  ## default "<namespace>-<name>" naming to avoid contention entirely.
  ##
  replicas: 1
  ## Pod resources. Recommended to set limits in production: each in-flight
  ## tools/call buffers up to ~1 MiB of function response (capped, bounded
  ## concurrency), so memory scales with concurrent calls.
  ##  resources:
  ##    limits:
  ##      cpu: <tbd>
  ##      memory: <tbd>
  ##    requests:
  ##      cpu: <tbd>
  ##      memory: <tbd>
  ##
  resources: {}

  ## Security Context
  ## It holds pod-level and container level security configuration.
  ## This is an experimental section, please verify before enabling in production.
  ## Ref: https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#security-context-1
  securityContext:
    enabled: true
    ## Mark it false, if you want to stop the non root user validation
    runAsNonRoot: true
    fsGroup: 10001
    runAsUser: 10001
    runAsGroup: 10001

## Statestore — the durable-state substrate (RFC-0021) consumed by workflows
## (RFC-0022), stateful functions (RFC-0023), and async invocation (RFC-0024).
##
## Fission never deploys a database product. In "external" mode the chart only
## wires a user-managed Postgres DSN into a Secret; in "embedded" mode it runs a
## single-replica, PVC-backed SQLite store (Fission's own binary) for local/small
## deployments — explicitly single-writer and NOT HA.
statestore:
  ## Off by default. A statestore-dependent feature that is enabled without this
  ## fails the chart render.
  enabled: false
  ## "external" | "embedded" — required when enabled.
  mode: ""
  ## Capability API port (mirrors pkg/svcinfo.PortStatestore).
  port: 8891
  external:
    ## Externally deployed Postgres DSN (recommended for production). Stored into
    ## a Secret named statestore-postgres (key: dsn).
    dsn: ""
    ## Or reference a pre-created Secret instead of dsn.
    existingSecret: ""
  embedded:
    ## PVC size for the embedded SQLite file.
    storageSize: 1Gi
    ## StorageClass for the PVC ("" uses the cluster default).
    storageClassName: ""
    resources: {}
    securityContext:
      enabled: true
      runAsNonRoot: true
      fsGroup: 10001
      runAsUser: 10001
      runAsGroup: 10001

## RFC-0024 asynchronous invocation (X-Fission-Invoke-Mode: async): the router
## durably enqueues the request and a per-replica dispatcher delivers it
## at-least-once with retries and a dead-letter queue. Requires statestore.enabled
## (the render gate in statestore/validate.yaml enforces it). Off by default.
asyncInvocation:
  enabled: false

## Multi-namespace tenancy (docs/multiple-namespace).
##
tenancy:
  ## mode selects the multi-namespace tenancy posture (docs/multiple-namespace).
  ## One of:
  ##   static  (default) — Fission resources only in the env-seeded namespace set
  ##           (defaultNamespace + additionalFissionNamespaces); per-namespace
  ##           Roles rendered by Helm; no tenant controller. Behaves exactly as
  ##           pre-tenancy Fission.
  ##   dynamic — namespaces onboarded/offboarded at runtime via FissionTenant CRs
  ##           or the fission.io/enabled label, with NO control-plane restart. The
  ##           tenant controller provisions narrow per-namespace fetcher/builder
  ##           RBAC + per-namespace derived HMAC keys; data-plane managers watch
  ##           Fission CRDs cluster-wide and filter to the onboarded set; tenant
  ##           Secrets/ConfigMaps/workloads are NEVER in a cluster-wide cache. The
  ##           recommended posture for untrusted multi-tenant clusters.
  ##   cluster — opt-in trusted-cluster mode. The controller auto-onboards every
  ##           namespace (no FissionTenant CR needed), so fetcher/builder pods keep
  ##           their narrow per-namespace RBAC + keys, but the control plane
  ##           (executor/buildermgr) reads Secrets/ConfigMaps and manages workloads
  ##           CLUSTER-WIDE for operational simplicity. Label a namespace
  ##           `fission.io/enabled=false` to opt it OUT of auto-onboarding (and to
  ##           offboard one already onboarded). SECURITY TRADE-OFF: a compromised
  ##           executor/buildermgr can read any namespace's Secrets. Use ONLY on
  ##           single-tenant/trusted clusters.
  ## dynamic and cluster set FISSION_TENANCY_MODE on the data-plane components and
  ## render the tenant controller; static renders neither.
  mode: static

## The tenant controller is the multi-namespace tenancy lifecycle controller
## (docs/multiple-namespace). It is rendered automatically when tenancy.mode is
## dynamic or cluster (and never when static); the settings below tune it.
##
tenantController:
  replicas: 1
  ## Run active-passive with leader election when replicas > 1.
  leaderElection:
    enabled: false
  ## On install/upgrade, seed a FissionTenant for each namespace already in
  ## defaultNamespace + additionalFissionNamespaces (idempotent post-upgrade
  ## hook). Restarts nothing. Set false to manage tenants exclusively via
  ## `fission tenant` / the fission.io/enabled label.
  seedExistingNamespaces: true
  ## Pod resources.
  resources: {}
  ## Security Context (pod + container level). Experimental; verify before
  ## enabling in production.
  securityContext:
    enabled: true
    runAsNonRoot: true
    fsGroup: 10001
    runAsUser: 10001
    runAsGroup: 10001

## The storage service is the home for all archives of packages with sizes larger than 256KB.
##
storagesvc:
  ## Pod resources as:
  ##  resources:
  ##    limits:
  ##      cpu: <tbd>
  ##      memory: <tbd>
  ##    requests:
  ##      cpu: <tbd>
  ##      memory: <tbd>
  ##
  resources: {}

  ## Deployment strategy defaults to RollingUpdate but use Recreate if new pods fail to
  ## attach to the volume until the old pod has released it.
  ## deploymentStrategy:
  ##   type: Recreate
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%

  ## Archive pruner removes archives from storage which are not referenced by any package.
  archivePruner:
    enabled: true
    ## Run prune routine at interval (in minutes)
    interval: 60

  ## maxArchiveSizeMib caps the size (in MiB) of a single package archive
  ## uploaded to /v1/archive. With internalAuth enabled, the HMAC verifier
  ## buffers the upload body in memory to check its signature and rejects
  ## anything larger with 413 Request Entity Too Large. (With internalAuth
  ## disabled there is no verifier, so this cap has no effect.)
  ## Use a plain integer number of MiB — no unit suffix (512, not 512Mi).
  ## 0 or unset means the 256 MiB default; there is no "unlimited" setting.
  ## Raise it for large packages instead of disabling internalAuth, and size
  ## the storagesvc memory request/limit to match, since the body is held in
  ## memory during verification. The cap applies to the multipart-wrapped
  ## request body, which is marginally larger than the raw archive.
  ##
  ## For very large packages, prefer publishing them as OCI images
  ## (packageRegistry.enabled + repositoryPrefix) over raising this cap: the
  ## code is then pulled and mounted from a registry instead of buffered
  ## through storagesvc, which scales and manages better.
  maxArchiveSizeMib: 256

  ## Security Context
  ## It holds pod-level and container level security configuration.
  ## This is an experimental section, please verify before enabling in production.
  ## Ref: https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#security-context-1
  securityContext:
    enabled: true
    ## Mark it false, if you want to stop the non root user validation
    runAsNonRoot: true
    fsGroup: 10001
    runAsUser: 10001
    runAsGroup: 10001

## The timer works like kubernetes CronJob but instead of creating a pod to do the task
## It sends a request to router to invoke the function.
##
timer:
  ## replicas to deploy. To run more than one safely, enable leaderElection
  ## below — active-passive HA: only the elected leader runs the controller.
  ##
  replicas: 1
  ## leaderElection enables Lease-based leader election. Leave disabled
  ## (default) for single-replica installs; set true with replicas > 1 for HA.
  ##
  leaderElection:
    enabled: false
  ## Pod resources as:
  ##  resources:
  ##    limits:
  ##      cpu: <tbd>
  ##      memory: <tbd>
  ##    requests:
  ##      cpu: <tbd>
  ##      memory: <tbd>
  ##
  resources: {}

  ## Security Context
  ## It holds pod-level and container level security configuration.
  ## This is an experimental section, please verify before enabling in production.
  ## Ref: https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#security-context-1
  securityContext:
    enabled: true
    ## Mark it false, if you want to stop the non root user validation
    runAsNonRoot: true
    fsGroup: 10001
    runAsUser: 10001
    runAsGroup: 10001

## Kafka: enable and configure the details
##
kafka:
  enabled: false
  ## replicas to deploy. To run more than one safely, enable leaderElection
  ## below — active-passive HA: only the elected leader consumes the queue.
  ##
  replicas: 1
  ## leaderElection enables Lease-based leader election. Leave disabled
  ## (default) for single-replica installs; set true with replicas > 1 for HA.
  ##
  leaderElection:
    enabled: false
  ## note: below link is only for reference.
  ## Please use the brokers link for your kafka here.
  ##
  brokers: "broker.kafka:9092" # or your-bootstrap-server.kafka:9092/9093
  ## Sample config for authentication
  ## authentication:
  ##   tls:
  ##     enabled: true
  ##     caCert: 'auth/kafka/ca.crt'
  ##     userCert: 'auth/kafka/user.crt'
  ##     userKey: 'auth/kafka/user.key'
  ##
  authentication:
    tls:
      enabled: false
      ## InsecureSkipVerify controls whether a client verifies the server's certificate chain and host name.
      ## Warning: Setting this to true, makes TLS susceptible to man-in-the-middle attacks
      ##
      insecureSkipVerify: false
      ## path to certificate containing public key of CA authority
      ##
      caCert: ""
      ## path to certificate containing public key of the user signed by CA authority
      ##
      userCert: ""
      ## path to private key of the user
      ##
      userKey: ""

  ## version of Kafka broker
  ## For 0.x it must be a string in the format
  ## "major.minor.veryMinor.patch" example: 0.8.2.0
  ## For 1.x it must be a string in the format
  ## "major.major.veryMinor" example: 2.0.1
  ## Should be >= 0.11.2.0 to enable Kafka record headers support
  ##
  # version: "0.11.2.0"

# The following components expose Prometheus metrics and have servicemonitors in this chart (disabled by default)
# router, executor, storage svc
serviceMonitor:
  enabled: false
  ##namespace in which you want to deploy servicemonitor
  ##
  namespace: ""
  ## Map of additional labels to add to the ServiceMonitor resources
  #  to allow selecting specific ServiceMonitors
  #  in case of multiple prometheus deployments
  additionalServiceMonitorLabels: {}
  #  release: "monitoring"
  #  key: "value"

# The following components expose Prometheus metrics and have podmonitors in this chart (disabled by default)
#
podMonitor:
  enabled: false
  ##namespace in which you want to deploy podmonitor
  ##
  namespace: ""
  ## Map of additional labels to add to the PodMonitor resources
  #  to allow selecting specific PodMonitor
  #  in case of multiple prometheus deployments
  additionalPodMonitorLabels: {}
  #  release: "monitoring"
  #  key: "value"

## Persist data to a persistent volume.
##
persistence:
  ## If true, fission will create/use a Persistent Volume Claim unless storageType is set to s3
  ## If false, use emptyDir
  ##
  enabled: true

  ## Must be set to either local or S3.
  ## If storateType is set(other than local), one of its backend configuration must be set as below.
  ##
  #storageType: local | s3

  ## Sample configuration for AWS s3 storage backend
  ##
  # s3:
  #   bucketName: <awsBucketName>
  #   subDir: <sub directory within a bucket>
  #   accessKeyId: <awsAccessKeyId>
  #   secretAccessKey: <awsSecretAccessKey>
  #   region: <awsRegion>
  ## For Minio and other s3 compatible storage systems set endPoint property
  #   endPoint: <s3StorageUrl>

  ## A manually managed Persistent Volume Claim name
  ## Requires persistence.enabled: true
  ## If defined, PVC must be created manually before volume will be bound
  ##
  # existingClaim:

  ## If defined, storageClassName: <storageClass>
  ## If set to "-", storageClassName: "", which disables dynamic provisioning
  ## If undefined (the default) or set to null, no storageClassName spec is
  ##   set, choosing the default provisioner. (gp2 on AWS, standard on
  ##   GKE, AWS & OpenStack)
  ##
  # storageClass: "-"

  accessMode: ReadWriteOnce
  size: 8Gi

## Extend the container specs for the core fission pods.
## Can be used to add things like affinity/tolerations/nodeSelectors/etc.
## For example:
## extraCoreComponentPodConfig:
##   affinity:
##     nodeAffinity:
##       requiredDuringSchedulingIgnoredDuringExecution:
##         nodeSelectorTerms:
##           - matchExpressions:
##             - key: capability
##               operator: In
##               values:
##                 - app
##
#extraCoreComponentPodConfig:
#  affinity:
#  tolerations:
#  nodeSelector:

## Analytics let us count how many people installed fission. Set to
## false to disable analytics.
##
analytics: true

## Internally used for generating an analytics job for non-helm installs
##
analyticsNonHelmInstall: false

## Google Analytics Tracking ID
##
gaTrackingID: UA-196546703-1

## Archive pruner is a garbage collector for archives on the fission storage service.

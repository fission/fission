apiVersion: skaffold/v4beta12
kind: Config
build:
  artifacts:
    - image: fission-bundle
      context: dist/fission-bundle_linux_amd64_v1
    - image: fetcher
      context: dist/fetcher_linux_amd64_v1
    - image: pre-upgrade-checks
      context: dist/pre-upgrade-checks_linux_amd64_v1
    - image: reporter
      context: dist/reporter_linux_amd64_v1
manifests:
  helm:
    flags:
      install:
        - --timeout=3m
        - --debug
        - --dependency-update
      upgrade:
        - --timeout=3m
        - --install
        - --debug
    releases:
      - name: fission
        chartPath: ./charts/fission-all
        valuesFiles:
          - ./charts/fission-all/values.yaml
        namespace: fission
        setValues:
          analytics: "false"
          # RFC-0024 async invocation needs the RFC-0021 statestore; enable both
          # (embedded SQLite) so the integration suite can exercise async invoke.
          asyncInvocation.enabled: "true"
          builderNamespace: ""
          builderPodSpec.enabled: "false"
          canaryDeployment.enabled: "false"
          coverage.enabled: "false"
          debugEnv: "false"
          executor.enableOCIImageVolume: "true"
          executor.functionServices.enabled: "true"
          executor.specializationConcurrency: "0"
          fetcher.allowInsecureRegistries: ""
          fetcher.imageTag: ""
          functionNamespace: ""
          gatewayAPI.enabled: "false"
          gatewayAPI.defaultParentRef: ""
          grafana.dashboards.enabled: "false"
          imageTag: ""
          mcp.enabled: "true"
          # Dev/CI clusters run without authentication, so opt into the
          # unauthenticated MCP endpoint explicitly (the chart fails closed otherwise).
          mcp.allowInsecure: "true"
          namespace: fission
          networkPolicy.enabled: "false"
          router.displayAccessLog: "false"
          openTelemetry.otlpCollectorEndpoint: ""
          openTelemetry.otlpInsecure: "true"
          podMonitor.additionalPodMonitorLabels.release: prometheus
          podMonitor.enabled: "false"
          podMonitor.namespace: monitoring
          pprof.enabled: "false"
          preUpgradeChecks.imageTag: ""
          priorityClassName: system-cluster-critical
          prometheus.serviceEndpoint: ""
          repository: ghcr.io
          router.endpointSliceCache.mode: "on"
          routerServiceType: LoadBalancer
          runtimePodSpec.enabled: "false"
          serviceMonitor.additionalServiceMonitorLabels.release: prometheus
          serviceMonitor.enabled: "false"
          serviceMonitor.namespace: monitoring
          statestore.enabled: "true"
          statestore.mode: "embedded"
          # RFC-0022 durable workflows ride the same statestore.
          workflows.enabled: "true"
          storagesvc.archivePruner.enabled: "true"
          storagesvc.archivePruner.interval: "60"
          # Multi-namespace tenancy is static by default; the dynamic-tenancy and
          # cluster-tenancy profiles flip tenancy.mode for the CI legs that
          # exercise each posture.
          tenancy.mode: "static"
          terminationMessagePath: /var/log/termination-log
          terminationMessagePolicy: FallbackToLogsOnError
        setValueTemplates:
          fetcher.image: '{{.IMAGE_FULLY_QUALIFIED_fetcher}}'
          image: '{{.IMAGE_FULLY_QUALIFIED_fission_bundle}}'
          postInstallReportImage: '{{.IMAGE_FULLY_QUALIFIED_reporter}}'
          preUpgradeChecks.image: '{{.IMAGE_FULLY_QUALIFIED_pre_upgrade_checks}}'
        wait: true
deploy:
  helm: {}
profiles:
  - name: kind
    patches:
      - op: replace
        path: /manifests/helm/releases/0/setValues/repository
        value: ""
      - op: replace
        path: /manifests/helm/releases/0/setValues/routerServiceType
        value: NodePort
  - name: kind-debug
    patches:
      - op: replace
        path: /manifests/helm/releases/0/setValues/repository
        value: ""
      - op: replace
        path: /manifests/helm/releases/0/setValues/routerServiceType
        value: NodePort
      - op: replace
        path: /manifests/helm/releases/0/setValues/debugEnv
        value: true
      - op: replace
        path: /manifests/helm/releases/0/setValues/pprof.enabled
        value: true
  - name: kind-ci
    patches:
      - op: replace
        path: /manifests/helm/releases/0/setValues/repository
        value: ""
      - op: replace
        path: /manifests/helm/releases/0/setValues/storagesvc.archivePruner.interval
        value: 1
      - op: replace
        path: /manifests/helm/releases/0/setValues/routerServiceType
        value: NodePort
      - op: replace
        path: /manifests/helm/releases/0/setValues/canaryDeployment.enabled
        value: true
      - op: replace
        path: /manifests/helm/releases/0/setValues/prometheus.serviceEndpoint
        value: http://prometheus-operated.monitoring.svc.cluster.local:9090
      - op: replace
        path: /manifests/helm/releases/0/setValues/podMonitor.enabled
        value: true
      - op: replace
        path: /manifests/helm/releases/0/setValues/serviceMonitor.enabled
        value: true
      - op: replace
        path: /manifests/helm/releases/0/setValues/grafana.dashboards.enabled
        value: true
      # Expose net/http/pprof on :6060 so the workflow can capture heap and
      # goroutine profiles as post-run artifacts for memory-leak triage.
      - op: replace
        path: /manifests/helm/releases/0/setValues/pprof.enabled
        value: true
      # Mount GOCOVERDIR into fission-bundle pods so the integration suite
      # can collect Go binary coverage (paired with GOFLAGS=-cover at build
      # time and a coverage collect step in the workflow). DEV/CI only.
      - op: replace
        path: /manifests/helm/releases/0/setValues/coverage.enabled
        value: true
      # Exercise the storagesvc NetworkPolicy in CI so a regression in its
      # selectors is caught before it reaches users with NetworkPolicy-aware
      # CNIs (kindnet enforces NetworkPolicy from kind v0.27 / k8s 1.30+).
      - op: replace
        path: /manifests/helm/releases/0/setValues/networkPolicy.enabled
        value: true
      # Exercise the RFC-0016 per-invocation access record in CI so the
      # structured "function access" log is covered end-to-end (verifiable in
      # the kind-logs artifact); off by default for users.
      - op: replace
        path: /manifests/helm/releases/0/setValues/router.displayAccessLog
        value: true
      # Exercise the Gateway API route provider in CI (paired with an Envoy
      # Gateway install + a Gateway in the fission namespace in push_pr.yaml,
      # and the TEST_GATEWAY_PARENTREF-gated TestGatewayRoute).
      - op: replace
        path: /manifests/helm/releases/0/setValues/gatewayAPI.enabled
        value: true
      - op: replace
        path: /manifests/helm/releases/0/setValues/gatewayAPI.defaultParentRef
        value: fission/eg-gateway
      # Trust the in-cluster plain-HTTP test registry for OCI package pulls
      # (paired with the registry Deployment in push_pr.yaml and the
      # FISSION_TEST_REGISTRY-gated TestOCIPackage* integration tests).
      - op: replace
        path: /manifests/helm/releases/0/setValues/fetcher.allowInsecureRegistries
        value: test-registry.default.svc.cluster.local:5000
      # Opt into image-volume delivery (RFC-0001 Path B) on every leg: the
      # executor's server-version gate keeps it inert below 1.33, and the
      # Path B integration test additionally gates on FISSION_TEST_IMAGE_VOLUME.
      - op: replace
        path: /manifests/helm/releases/0/setValues/executor.enableOCIImageVolume
        value: true
      # The RFC-0002 EndpointSlice data plane is on by chart default (phase 4);
      # one workflow leg pins the router back to mode=off post-deploy so the
      # legacy RPC path stays covered.
  # dynamic-tenancy turns on multi-namespace tenancy (the dynamic, restart-free
  # onboarding model). Composed onto kind-ci as `-p kind-ci,dynamic-tenancy` on
  # the non-legacy CI legs, so the whole suite runs against a dynamic-mode
  # control plane (default is auto-seeded as a tenant by the migration job) and
  # TestDynamicTenantLifecycle exercises runtime namespace onboarding.
  - name: dynamic-tenancy
    patches:
      - op: replace
        path: /manifests/helm/releases/0/setValues/tenancy.mode
        value: dynamic
  # cluster-tenancy turns on the opt-in trusted-cluster watch-all model. Composed
  # onto kind-ci as `-p kind-ci,cluster-tenancy` on one CI leg, so the suite runs
  # against a cluster-mode control plane (every namespace auto-onboarded, control
  # plane reads cluster-wide). Mirrors dynamic-tenancy / the RFC-0002 legacy-pin.
  - name: cluster-tenancy
    patches:
      - op: replace
        path: /manifests/helm/releases/0/setValues/tenancy.mode
        value: cluster
  - name: kind-ci-old
    patches:
      - op: replace
        path: /manifests/helm/releases/0/setValues/repository
        value: ""
      - op: replace
        path: /manifests/helm/releases/0/setValues/storagesvc.archivePruner.interval
        value: 1
      - op: replace
        path: /manifests/helm/releases/0/setValues/routerServiceType
        value: NodePort
      - op: replace
        path: /manifests/helm/releases/0/setValues/canaryDeployment.enabled
        value: true
      - op: replace
        path: /manifests/helm/releases/0/setValues/prometheus.serviceEndpoint
        value: http://prometheus-operated.monitoring.svc.cluster.local:9090
      - op: replace
        path: /manifests/helm/releases/0/setValues/podMonitor.enabled
        value: true
      - op: replace
        path: /manifests/helm/releases/0/setValues/serviceMonitor.enabled
        value: true
      - op: replace
        path: /manifests/helm/releases/0/setValues/grafana.dashboards.enabled
        value: true
      - op: replace
        path: /manifests/helm/releases/0/setValues/builderNamespace
        value: fission-builder
      - op: replace
        path: /manifests/helm/releases/0/setValues/functionNamespace
        value: fission-function
  - name: kind-opentelemetry
    patches:
      - op: replace
        path: /manifests/helm/releases/0/setValues/repository
        value: ""
      - op: replace
        path: /manifests/helm/releases/0/setValues/routerServiceType
        value: NodePort
      - op: replace
        path: /manifests/helm/releases/0/setValues/pprof.enabled
        value: true
      - op: replace
        path: /manifests/helm/releases/0/setValues/openTelemetry.otlpCollectorEndpoint
        value: otel-collector.opentelemetry-operator-system.svc:4317
